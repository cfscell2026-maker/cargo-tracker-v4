function statutLabel(s){ return STATUT_LABEL[s]||s||'—'; }
/* Étapes EN ATTENTE — miroir serveur (modèle PARALLÈLE Balise ∥ Bon de Sortie, v2.7). */
function aFait(v){ return v!=='' && v!=null; }
function etatCellules(x){
  var enCharge=(x.statut===STATUTS.CAMION||x.statut===STATUTS.CHARGEMENT||x.statut===STATUTS.VEHICULE_OUILLAGE);
  return { cfs:!enCharge,
    valide:(x.sauteValidation==='Oui')||aFait(x.dateValidation),  // v3.0 : signature chef brigade
    t1:(x.sauteT1==='Oui')||aFait(x.dateT1),
    balise:(x.sauteBalise==='Oui')||(x.estVehicule==='Oui')||aFait(x.datePoseGPS),
    bs:(x.sauteBS==='Oui')||aFait(x.bonSortieNumero),             // v3.6 : ouillage saute le bon de sortie
    sorti:(x.statut===STATUTS.SORTIE) };
}
function etapesEnAttente(x){
  var e=etatCellules(x);
  if(e.sorti) return [];
  if(!e.cfs) return ['CFS'];
  if(!e.valide) return ['VALIDATION'];   // v3.0 : validation chef brigade avant T1/Balise/Bon de sortie
  if(!e.t1) return ['T1'];
  var p=[]; if(!e.balise) p.push('BALISE'); if(!e.bs) p.push('BS'); if(e.balise&&e.bs) p.push('PP');
  return p;
}
function nextStep(x){ var p=etapesEnAttente(x); return p.length?p[0]:null; }

/* ----------------------------- Utils RPC --------------------------------- */
function call(action, data){
  return new Promise(function(resolve, reject){
    google.script.run
      .withSuccessHandler(function(res){
        if(res && res.ok) resolve(res.data);
        else { if(res && res.auth){ forceLogout(res.error); } reject(new Error(res ? res.error : 'Erreur inconnue')); }
      })
      .withFailureHandler(function(err){ reject(err); })
      .rpc(action, STATE.token, data || {});
  });
}
function loginRequest(u,p){
  return new Promise(function(resolve,reject){
    google.script.run.withSuccessHandler(resolve).withFailureHandler(reject).login(u,p);
  });
}

/* ----------------------------- UI helpers -------------------------------- */
function $(s,r){ return (r||document).querySelector(s); }
function $all(s,r){ return Array.prototype.slice.call((r||document).querySelectorAll(s)); }
function esc(v){ return String(v==null?'':v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function busy(on){ $('#busy').classList.toggle('hidden', !on); }
function toast(msg, type){
  var t=document.createElement('div'); t.className='toast '+(type||''); t.textContent=msg;
  $('#toasts').appendChild(t); setTimeout(function(){ t.style.opacity='0'; setTimeout(function(){t.remove();},250); }, 3600);
}
function fmtDate(v){
  if(!v) return '—'; var d=new Date(v); if(isNaN(d.getTime())) return esc(v);
  var p=function(n){return ('0'+n).slice(-2);};
  return p(d.getDate())+'/'+p(d.getMonth()+1)+'/'+d.getFullYear()+' '+p(d.getHours())+':'+p(d.getMinutes());
}
// v2.8 — au statut « GPS Installé », on affiche « Balisé » OU « Dispensé » (plus « Balisé / Dispensé »)
// dès qu'on dispose de la ligne (numeroGPS posé = Balisé ; sinon dispense).
function statutLabelRow(s, x){
  if(s===STATUTS.GPS && x){
    if(x.numeroGPS) return 'Balisé';
    if(x.numeroDispense || x.baliseRequise==='Non') return 'Dispensé';
    if('numeroGPS' in x) return 'Dispensé';
  }
  return statutLabel(s);
}
function statutTag(s, x){
  var c = {'Camion créé':'st-camion','En cours de chargement':'st-charge','Véhicule ouillage créé':'st-charge','Créée':'st-creee','T1 saisi':'st-t1','GPS Installé':'st-gps','Bon de sortie émis':'st-bs','Sortie Enregistrée':'st-sortie'}[s]||'';
  return '<span class="tag '+c+'">'+esc(statutLabelRow(s, x))+'</span>';
}
// v2.8 — T1/Bon de sortie peuvent être liés à un conteneur (enlèvement) : tableaux d'objets {conteneur,numero}.
function t1Display(arr){ return (arr||[]).map(function(o){ return (o&&typeof o==='object')?(o.numero+(o.conteneur?' → '+o.conteneur:'')):o; }).join(', '); }
function bsParse(v){ if(v==null||v==='') return []; if(typeof v==='string'){ var t=v.trim(); if(t.charAt(0)==='['){ try{ return JSON.parse(t); }catch(e){} } return [{numero:v}]; } return Array.isArray(v)?v:[v]; }
function bsDisplay(v){ return bsParse(v).map(function(o){ return (o&&typeof o==='object')?(o.numero+(o.conteneur?' → '+o.conteneur:(o.t1?' (T1 '+o.t1+')':''))):o; }).join(', '); }

/* ----------------------------- Modal ------------------------------------- */
function modal(title, bodyHtml, footHtml){
  closeModal();
  var w=document.createElement('div'); w.id='modalWrap';
  w.innerHTML='<div class="modal"><div class="mh"><span>'+esc(title)+'</span>'+
    '<button class="x" onclick="closeModal()">×</button></div>'+
    '<div class="mb">'+bodyHtml+'</div><div class="mf">'+(footHtml||'')+'</div></div>';
  w.addEventListener('click',function(e){ if(e.target===w) closeModal(); });
  document.body.appendChild(w);
}
function closeModal(){ var w=$('#modalWrap'); if(w) w.remove(); }

/* ----------------------------- Auth -------------------------------------- */
function doLogin(){
  var u=$('#li_user').value.trim(), p=$('#li_pass').value;
  if(!u||!p){ toast('Identifiant et mot de passe requis','warn'); return; }
  var btn=$('#li_btn'); btn.disabled=true; btn.textContent='Connexion…';
  loginRequest(u,p).then(function(res){
    btn.disabled=false; btn.textContent='Se connecter';
    if(!res || !res.ok){ toast((res&&res.error)||'Échec de connexion','bad'); return; }
    STATE.token=res.token; STATE.user=res.user;
    try{ localStorage.setItem(LS_KEY, res.token+'§'+JSON.stringify(res.user)); }catch(e){}
    enterApp();
  }).catch(function(){ btn.disabled=false; btn.textContent='Se connecter'; toast('Erreur réseau','bad'); });
}
function forceLogout(msg){
  try{ localStorage.removeItem(LS_KEY); }catch(e){}
  STATE.token=null; STATE.user=null;
  $('#app').classList.add('hidden'); $('#login').classList.remove('hidden');
  if(msg) toast(msg,'warn');
}
function doLogout(){
  if(STATE.token){ try{ google.script.run.logout(STATE.token); }catch(e){} }
  forceLogout('Vous êtes déconnecté.');
}

/* ----------------------------- Boot -------------------------------------- */
function enterApp(){
  $('#login').classList.add('hidden'); $('#app').classList.remove('hidden');
  buildShell(); go('dash');
}
function tryRestore(){
  var raw=null; try{ raw=localStorage.getItem(LS_KEY); }catch(e){}
  if(!raw){ return false; }
  var i=raw.indexOf('§'); if(i<0) return false;
  STATE.token=raw.slice(0,i);
  try{ STATE.user=JSON.parse(raw.slice(i+1)); }catch(e){ return false; }
  // Entrée optimiste : le premier appel (stats) déclenche forceLogout() si la
  // session a expiré (géré dans call()). Évite un aller-retour supplémentaire.
  enterApp();
  return true;
}

/* Reconstruit la liste des conteneurs d'un camion quand le type change (création) */
function rebuildCamionBody(card, type){
  if(!type) return;
  var body=$('.cam-body', card);
  var data = readCamion(card);                 // sauvegarde des valeurs actuelles
  body.setAttribute('data-type', type);
  body.innerHTML = camionBodyHtml(type, data.scellesCamion);
  var conts = (data.conteneurs&&data.conteneurs.length)?data.conteneurs:[{}];
  conts.forEach(function(ct){ addConteneur(card, ct); });
  bindCamion(card);
}

  var uid = ++CAMSEQ;

  wrap.className='camion-card'; wrap.setAttribute('data-uid',uid);

   '<div class="cam-body" data-type="'+esc(type)+'">'+camionBodyHtml(type, data&&data.scellesCamion)+'</div>';

  conts.forEach(function(ct){ addConteneur(wrap, ct); });
  bindCamion(wrap);
  renumberCamions();
}

/* Corps d'un camion.
   - Dépotage : bloc « Scellés du camion » (3 champs, 2 obligatoires) AVANT les conteneurs ;
     les conteneurs n'ont pas de champ scellé.
   - Enlèvement : chaque conteneur porte son propre scellé (comportement d'origine). */
function camionBodyHtml(type, scelles){
  scelles = scelles || [];
  var bloc = '';
  if(type==='Dépotage'){
    bloc =
      '<div class="scelles-camion">'+
        '<div class="section-title">Scellés du camion (2 obligatoires, 3ᵉ facultatif)</div>'+
        '<div class="row">'+
          field('Scellé 1 *','<input type="text" class="up sc-cam" maxlength="30" value="'+esc(scelles[0]||'')+'">')+
          field('Scellé 2 *','<input type="text" class="up sc-cam" maxlength="30" value="'+esc(scelles[1]||'')+'">')+
          field('Scellé 3','<input type="text" class="up sc-cam" maxlength="30" value="'+esc(scelles[2]||'')+'">')+
        '</div>'+
      '</div>';
  }
  return bloc+
    '<div class="conteneurs"></div>'+
    '<button class="btn sec sm addcont" type="button">＋ Ajouter un conteneur</button>';
}

/* Options de <select> avec un placeholder « — Choisir — » pour la valeur vide. */
function selOptsPh(arr, val){
  return arr.map(function(t){
    if(t==='') return '<option value="">— Choisir —</option>';
    return '<option '+(val===t?'selected':'')+'>'+esc(t)+'</option>';
  }).join('');
}

/* ----- Validation « champ obligatoire » avec focus + signal visuel ----- */
function clearInvalidAll(){ $all('.invalid').forEach(function(e){ e.classList.remove('invalid'); }); }
function signalInvalid(el, msg){
  if(!el){ toast(msg,'warn'); return; }
  el.classList.add('invalid');
  try{ el.scrollIntoView({behavior:'smooth', block:'center'}); }catch(e){}
  try{ el.focus({preventScroll:true}); }catch(e){ try{ el.focus(); }catch(_){} }
  toast(msg,'warn');
}
/* renvoie true si rempli ; sinon signale et renvoie false */
function need(el, label){
  if(el && String(el.value).trim()!==''){ return true; }
  signalInvalid(el, '« '+label+' » est obligatoire — veuillez le renseigner.');
  return false;
}
/* Valide tout le formulaire rapport ; s'arrête au 1er champ manquant. */
function validateRapport(){
  clearInvalidAll();
  // ② Déclaration (si le bloc est affiché) — tous les champs obligatoires.
  if($('#blkDecl') && !$('#blkDecl').classList.contains('hidden')){
    var decl=[['#d_decl','Déclarant'],['#d_contact','Contact déclarant'],['#d_dest','Destination marchandise'],
      ['#d_bureau','Bureau de déclaration'],['#d_typed','Type de déclaration'],['#d_numd','N° de déclaration'],
      ['#d_annee','Année']];
    // v3.6 — la désignation n'est requise dans la déclaration que hors véhicule.
    if(!($('#f_type') && $('#f_type').value===OP_VEH)) decl.push(['#d_desc','Description de la marchandise']);
    for(var i=0;i<decl.length;i++){ if(!need($(decl[i][0]), decl[i][1])) return false; }
    var telEl=$('#d_contact');
    if(telEl && telEl.value.replace(/\D/g,'').length<6){
      signalInvalid(telEl,'Contact déclarant : numéro de téléphone invalide (au moins 6 chiffres).'); return false;
    }
  }
  // Mode Dépotage / Véhicule : conteneur d'origine (si rempli) + au moins un véhicule.
  if($('#f_type') && $('#f_type').value===OP_VEH){
    var co=$('#d_ctorigine');
    if(co && co.value.trim()){
      var cov=co.value.toUpperCase().replace(/[^A-Z0-9]/g,'');
      if(!/^[A-Z]{4}[0-9]{7}$/.test(cov)){ signalInvalid(co,"N° conteneur d'origine = 4 lettres + 7 chiffres (ex. MSKU1234567)."); return false; }
    }
    var vcards=$all('.vehicule-card');
    if(!vcards.length){ toast('Ajoutez au moins un véhicule','warn'); return false; }
    for(var vi=0;vi<vcards.length;vi++){
      if(!need($('.veh-chassis',vcards[vi]), 'Véhicule '+(vi+1)+' : N° de châssis (VIN)')) return false;
      if(!need($('.veh-dest',vcards[vi]), 'Véhicule '+(vi+1)+' : Destination')) return false;
    }
  }
  // ③ Camions (en mode véhicule : optionnels). Scellés requis seulement si « chargement terminé ».
  // v3.6 — ouillage : pas de camions d'effets divers à valider (la carte est masquée et ils ne sont pas envoyés).
  var regOuil=document.querySelector('input[name=veh_regime]:checked');
  if($('#f_type') && $('#f_type').value===OP_VEH && regOuil && regOuil.value==='ouillage') return true;
  var chargeTermine=(!$('#f_charge')||$('#f_charge').checked);
  var cards=$all('.camion-card');
  for(var k=0;k<cards.length;k++){
    var card=cards[k], n=k+1;
    if(!need($('.cam-num',card), 'Camion '+n+' : N° Camion')) return false;
    var body=$('.cam-body',card);
    if(chargeTermine && body && body.getAttribute('data-type')==='Dépotage'){
      var sc=$all('.sc-cam',card);
      if(!need(sc[0], 'Camion '+n+' : Scellé 1')) return false;
      if(!need(sc[1], 'Camion '+n+' : Scellé 2')) return false;
    }
    var rows=$all('.cont-row',card);
    if(!rows.length){ toast('Camion '+n+' : ajoutez au moins un conteneur','warn'); return false; }
    for(var j=0;j<rows.length;j++){
      var cn=j+1;
      if(!need($('.cont-num',rows[j]),   'Camion '+n+' · Conteneur '+cn+' : N° de conteneur')) return false;
      var cnEl=$('.cont-num',rows[j]), cnVal=cnEl?cnEl.value.toUpperCase().replace(/[^A-Z0-9]/g,''):'';
      if(!/^[A-Z]{4}[0-9]{7}$/.test(cnVal)){
        signalInvalid(cnEl,'Camion '+n+' · Conteneur '+cn+' : N° conteneur = 4 lettres + 7 chiffres (ex. MSKU1234567).'); return false;
      }
      if(!need($('.cx-taille',rows[j]),  'Camion '+n+' · Conteneur '+cn+' : Taille')) return false;
      if(!need($('.cx-type',rows[j]),    'Camion '+n+' · Conteneur '+cn+' : Type')) return false;
      var pl=$('.cont-plomb',rows[j]);   // scellé par conteneur (enlèvement uniquement)
      if(chargeTermine && pl && !need(pl, 'Camion '+n+' · Conteneur '+cn+' : Scellé / Plomb')) return false;
    }
  }
  return true;
}

function addConteneur(card, data){

  var estDep=(body&&body.getAttribute('data-type')==='Dépotage');
  var row=document.createElement('div');
  row.className='cont-row';
  row.innerHTML=
    '<div class="row" style="align-items:flex-end">'+
      field('Conteneur *','<input type="text" class="tc cont-num" maxlength="11" placeholder="MSKU1234567" value="'+esc(data.num||'')+'">')+
      (estDep?'':field('Scellé / Plomb *','<input type="text" class="up cont-plomb" value="'+esc(data.plomb||'')+'">'))+
      field('Taille *','<select class="cx-taille">'+selOptsPh(TAILLES_CONTENEUR,data.taille)+'</select>')+
      field('Type *','<select class="cx-type">'+selOptsPh(TYPES_CONTENEUR,data.type)+'</select>')+
      '<div class="field" style="flex:0"><button class="btn ghost sm togx" type="button">⊕ Poids/Champs</button></div>'+
      '<div class="field" style="flex:0"><button class="btn danger sm rmcont" type="button">✕</button></div>'+
    '</div>'+
    '<div class="cont-extra hidden">'+
      '<div class="row">'+
        field('Poids','<input type="text" class="up cx-poids" value="'+esc(data.poids||'')+'">')+'</div>'+
      '<div class="section-title">Champs libres</div>'+
      '<div class="libres"></div>'+
      '<button class="btn sec sm addlibre" type="button">＋ Champ libre</button>'+
    '</div>';
  list.appendChild(row);

  $('.cont-num',row).addEventListener('blur',function(){ checkDupConteneur(this); });
  $('.rmcont',row).addEventListener('click',function(){ if(list.children.length<=1){toast('Au moins un conteneur','warn');return;} row.remove(); renumberConteneurs(card); });
  $('.togx',row).addEventListener('click',function(){ $('.cont-extra',row).classList.toggle('hidden'); });
  $('.addlibre',row).addEventListener('click',function(){ addLibre($('.libres',row)); });
  (data.extra||[]).forEach(function(x){ addLibre($('.libres',row), x); });
  if(data.poids||(data.extra&&data.extra.length)) $('.cont-extra',row).classList.remove('hidden');
  renumberConteneurs(card);
}
function renumberConteneurs(card){
  $all('.cont-row',card).forEach(function(row,i){
    var lbl=row.querySelector('label'); if(lbl) lbl.textContent='Conteneur '+(i+1)+' *';
  });

function addLibre(container, data){
  data=data||{};
  var r=document.createElement('div'); r.className='row libre-row';
  r.innerHTML=field('Nom','<input type="text" class="up lb-nom" value="'+esc(data.nom||'')+'">')+

  container.appendChild(r);

}

      field('Marque','<input type="text" class="up veh-marque" maxlength="40" placeholder="Ex : TOYOTA" value="'+esc(data.marque||'')+'">')+
      field('Modèle','<input type="text" class="up veh-modele" maxlength="40" placeholder="Ex : HILUX" value="'+esc(data.modele||'')+'">')+

/* Lecture d'un camion depuis le DOM -> objet payload */
function readCamion(card){
  var o={ numeroCamion: $('.cam-num',card)?$('.cam-num',card).value:'' };
  // Scellés du camion (dépotage uniquement) : on lit les champs présents, vides inclus,
  // pour pouvoir les restaurer si l'utilisateur change de type puis revient.
  o.scellesCamion=$all('.sc-cam',card).map(function(inp){ return inp.value; });
  o.conteneurs=$all('.cont-row',card).map(function(row){
    return {
      num:    $('.cont-num',row).value,
      plomb:  $('.cont-plomb',row)?$('.cont-plomb',row).value:'',
      taille: $('.cx-taille',row)?$('.cx-taille',row).value:'',
      type:   $('.cx-type',row)?$('.cx-type',row).value:'',
      poids:  $('.cx-poids',row)?$('.cx-poids',row).value:'',
      extra:  $all('.libre-row',row).map(function(l){ return {nom:$('.lb-nom',l).value, valeur:$('.lb-val',l).value}; })
    };
  });
  return o;
}
/* Lit conteneursDetails en gérant l'ancien format (tableau simple)
   ET le nouveau ({conteneurs:[...], scellesCamion:[...]}).
   Retourne toujours {conteneurs:[...], scellesCamion:[...]}. */
function parseDetails(json){
  var d; try{ d=JSON.parse(json||'[]'); }catch(e){ d=[]; }
  if(Array.isArray(d)) return { conteneurs:d, scellesCamion:[] };          // ancien format
  return { conteneurs:(d&&d.conteneurs)||[], scellesCamion:(d&&d.scellesCamion)||[] };
}

/* Cargaison (cargo.get) -> structure camion pour pré-remplir le formulaire d'édition */
function camionFromCargo(x){
  var d=parseDetails(x.conteneursDetails);
  var conts=d.conteneurs;
  var scelles=d.scellesCamion;
  if(!conts.length){
    // Repli sur l'aperçu (anciennes cargaisons ou détail absent).
    if(x.typeOperation==='Dépotage'){
      // En dépotage, plomb1/2/3 = scellés du camion ; on récupère juste les n° conteneurs.
      [x.conteneur1,x.conteneur2,x.conteneur3,x.conteneur4].forEach(function(n){ if(n) conts.push({num:n}); });
      if(!scelles.length) scelles=[x.plomb1,x.plomb2,x.plomb3].filter(function(s){return s;});
    } else {
      [[x.conteneur1,x.plomb1],[x.conteneur2,x.plomb2],[x.conteneur3,x.plomb3],[x.conteneur4,x.plomb4]].forEach(function(p){
        if(p[0]) conts.push({num:p[0], plomb:p[1]||''});
      });
    }
  }
  return { numeroCamion:x.numeroCamion, conteneurs:conts, scellesCamion:scelles };
}

/* Assemble le payload commun (déclaration + observations) */
function readDeclaration(){
  return {
    declarant:$('#d_decl')?$('#d_decl').value:'',

    destinationMarchandise:$('#d_dest')?$('#d_dest').value:'',

    typeDeclaration:$('#d_typed')?$('#d_typed').value:'',
    numeroDeclaration:$('#d_numd')?$('#d_numd').value:'',

    descriptionMarchandise:(($('#f_type')&&$('#f_type').value===OP_VEH)?($('#veh_desc')?$('#veh_desc').value:''):($('#d_desc')?$('#d_desc').value:'')),

function consoMode(){ var r=document.querySelector('input[name=conso_mode]:checked'); return r?r.value:'balise'; }
/* Apurement : recherche la déclaration et affiche le restant ; masque « nb conteneurs » si déjà connue. */
function lookupDecl(){

    modal('Rapport créé ✔ — '+esc(r.rapportId),
      '<p>Éléments enregistrés :</p>'+
      '<table class="grid"><thead><tr><th>ID</th><th>Identifiant</th><th>Type</th></tr></thead><tbody>'+lignesV+lignesC+'</tbody></table>'+

/* ============================================================================
 *  Doublons (avertissement), chargement mixte, correction N° camion
 * ========================================================================== */
function normAlnum(v){ return String(v||'').toUpperCase().replace(/[^A-Z0-9]/g,''); }
function canMixte(){ return STATE.user.role==='CFS'||STATE.user.role==='ADMIN'; }

/* Place/efface un avertissement de doublon sous le champ concerné. */
function showDup(inputEl, html){
  if(!inputEl) return;
  var fld=inputEl.closest?inputEl.closest('.field'):inputEl.parentNode; if(!fld) fld=inputEl.parentNode;
  var w=fld.querySelector('.dup-warn');
  if(!html){ if(w){ w.innerHTML=''; w.classList.add('hidden'); } return; }
  if(!w){ w=document.createElement('div'); w.className='dup-warn'; fld.appendChild(w); }
  w.classList.remove('hidden'); w.innerHTML=html;
}
function checkDupCamion(inputEl){
  var val=inputEl.value.trim(); if(!val){ showDup(inputEl,''); return; }
  call('cargo.checkdup',{numeroCamion:val}).then(function(r){
    var m=(r&&r.camion)||[];
    showDup(inputEl, m.length?dupHtml('camion',val,m):'');
  }).catch(function(){});
}
function checkDupConteneur(inputEl){
  var val=inputEl.value.trim(); if(!val){ showDup(inputEl,''); return; }
  call('cargo.checkdup',{conteneurs:[val]}).then(function(r){
    var m=(r&&r.conteneurs&&r.conteneurs[normAlnum(val)])||[];
    showDup(inputEl, m.length?dupHtml('conteneur',val,m):'');
  }).catch(function(){});
}
function dupHtml(kind, val, matches){
  var actif=matches.filter(function(x){return x.actif;});
  var cls=actif.length?'dup-strong':'dup-soft';
  var quoi=(kind==='camion'?'Ce N° camion':'Ce conteneur')+' « '+esc(val)+' »';
  var head=actif.length
    ? '⛔ '+quoi+' est déjà enregistré sur une cargaison ENCORE ACTIVE (non sortie). Vérifiez avant de continuer.'
    : '⚠ '+quoi+' a déjà été enregistré (cargaison(s) sortie(s)).';
  var rows=matches.slice(0,5).map(function(x){
    var mix=canMixte()?' <button type="button" class="btn ghost xs" onclick="mixteForm(\''+esc(x.id)+'\')">Chargement mixte</button>':'';
    return '<div class="dup-row"><a onclick="go(\'detail\',\''+esc(x.id)+'\')">'+esc(x.id)+'</a> · '+
      esc(x.numeroCamion||'—')+(x.conteneur?(' · cont. '+esc(x.conteneur)):'')+' · '+
      statutTag(x.statut, x)+' · '+fmtDate(x.dateCreation)+mix+'</div>';
  }).join('');
  return '<div class="'+cls+'"><div class="dup-head">'+head+'</div>'+rows+
    '<div class="help">Avertissement non bloquant. Cliquez l\'ID pour mettre à jour la fiche existante'+
    (canMixte()?', ou « Chargement mixte » pour la compléter sans créer de doublon.':'.')+'</div></div>';
}

      rows.forEach(function(x){ h+='<tr class="clickable" onclick="go(\'detail\',\''+esc(x.id)+'\')"><td class="mono">'+esc(x.id)+'</td><td>'+esc(x.numeroCamion)+'</td><td>'+fmtDate(x.dateCreation)+'</td><td>'+statutTag(x.statut, x)+'</td></tr>'; });
      $('#cc_list').innerHTML=h+'</tbody></table>';
    }).catch(function(){});
  }
  function create(){
    var n=$('#cc_num').value.trim(); if(!n){ toast('N° camion requis','warn'); return; }
    var r=$('#cc_routage').value; if(!r){ toast('Choisissez le type d\'opération','warn'); return; }
    busy(true); $('#cc_go').disabled=true;
    call('cargo.createcamion',{numeroCamion:n, routage:r}).then(function(res){
      busy(false); $('#cc_go').disabled=false; toast('Camion créé ✔ ('+res.id+')','ok'); go('detail', res.id);
    }).catch(function(e){ busy(false); $('#cc_go').disabled=false; err(e); });
  }
  $('#cc_go').addEventListener('click',create);
  $('#cc_num').addEventListener('keydown',function(e){ if(e.key==='Enter') create(); });
  refresh();
};

/* ---- Recherche multi-critères ---- */
SCREENS.search=function(c){
  c.innerHTML='<div class="card"><h2>⌕ Rechercher par N° de camion</h2>'+
    '<div class="row" style="align-items:flex-end">'+
      '<div class="col"><label>N° de camion</label><input type="text" id="s_val" class="up" placeholder="Ex : AB12 — recherche souple"></div>'+
      '<button class="btn" id="s_go">Rechercher</button>'+
    '</div>'+
    '<p class="help">Recherche flexible : espaces, tirets et casse ignorés ; saisie partielle acceptée.</p>'+
    '</div><div id="sres"></div>';
  function run(){
    var val=$('#s_val').value.trim();
    if(!val){ $('#sres').innerHTML=''; return; }
    busy(true);
    call('cargo.search',{critere:'camion', valeur:val}).then(function(rows){
      busy(false);
      if(!rows.length){ $('#sres').innerHTML='<div class="card"><div class="empty"><div class="big">⌕</div>Aucun camion trouvé.</div></div>'; return; }
      var h='<div class="card"><h2>'+rows.length+' résultat(s)</h2><table class="grid"><thead><tr><th>ID</th><th>Date</th><th>Camion</th><th>Opération</th><th>Statut</th><th>GPS</th></tr></thead><tbody>';
      rows.forEach(function(x){ h+='<tr class="clickable" onclick="go(\'detail\',\''+esc(x.id)+'\')"><td class="mono">'+esc(x.id)+'</td><td>'+fmtDate(x.dateCreation)+'</td><td>'+esc(x.numeroCamion)+'</td><td>'+esc(x.typeOperation||'—')+'</td><td>'+statutTag(x.statut, x)+'</td><td>'+esc(x.numeroGPS||'—')+'</td></tr>'; });
      $('#sres').innerHTML=h+'</tbody></table></div>';
    }).catch(function(e){ busy(false); err(e); });
  }
  $('#s_go').addEventListener('click',run);
  var tmr; $('#s_val').addEventListener('input',function(){ clearTimeout(tmr); tmr=setTimeout(run,300); });
  $('#s_val').addEventListener('keydown',function(e){ if(e.key==='Enter'){ clearTimeout(tmr); run(); } });
};

/* ---- Détail cargaison + actions contextuelles ---- */
SCREENS.detail=function(c, id){
  c.innerHTML='<div class="card"><div class="empty"><div class="spin" style="margin:auto"></div></div></div>';
  call('cargo.get',{id:id}).then(function(x){ renderDetail(c,x); }).catch(function(e){ err(e); c.innerHTML='<div class="card"><div class="empty"><div class="big">⚠</div>'+esc(e.message)+'</div></div>'; });
};
function renderDetail(c, x){
  if(x.estVehicule==='Oui') return renderDetailVehicule(c, x);
  var role=STATE.user.role;
  var estEnl=(x.typeOperation==='Enlèvement');
  // États dérivés des FAITS (modèle parallèle : la Balise et le Bon de Sortie sont indépendants).
  var sSortie=(x.statut===STATUTS.SORTIE);
  var sCfsDone=(x.statut!==STATUTS.CAMION && x.statut!==STATUTS.CHARGEMENT);
  var sValidDone=(x.sauteValidation==='Oui')||aFait(x.dateValidation)||sSortie; // v3.0 validation chef brigade
  var sT1done=(x.sauteT1==='Oui')||aFait(x.dateT1)||sSortie,
      sBaldone=(x.sauteBalise==='Oui')||aFait(x.datePoseGPS)||sSortie,
      sBSdone=aFait(x.bonSortieNumero)||sSortie;
  var pd=parseDetails(x.conteneursDetails);
  var dets=pd.conteneurs;
  var scellesCam=pd.scellesCamion;
  var estDep=(x.typeOperation==='Dépotage');
  if(!dets.length){
    if(estDep){
      [x.conteneur1,x.conteneur2,x.conteneur3,x.conteneur4].forEach(function(n){ if(n) dets.push({num:n}); });
      if(!scellesCam.length) scellesCam=[x.plomb1,x.plomb2,x.plomb3].filter(function(s){return s;});
    } else {
      [[x.conteneur1,x.plomb1],[x.conteneur2,x.plomb2],[x.conteneur3,x.plomb3],[x.conteneur4,x.plomb4]].forEach(function(p){
        if(p[0]) dets.push({num:p[0],plomb:p[1]||''}); });
    }
  }
  var conteneurs=dets.filter(function(d){return d&&d.num;}).map(function(d,i){
    var sup=[]; if(d.taille)sup.push('Taille '+esc(d.taille)); if(d.type)sup.push(esc(d.type)); if(d.poids)sup.push('Poids '+esc(d.poids));
    if(d.numeroDeclaration)sup.push('Décl. '+esc(d.numeroDeclaration));
    if(d.declarant)sup.push('Déclarant '+esc(d.declarant)); // v3.2 : déclaration propre au conteneur (dépotage mixte)
    (d.extra||[]).forEach(function(z){ if(z&&z.nom) sup.push(esc(z.nom)+' : '+esc(z.valeur||'')); });
    // En dépotage, le conteneur ne porte pas de scellé (il est au niveau du camion).
    var scTxt=(!estDep && d.plomb)?(' / Scellé '+esc(d.plomb)):'';
    return '<div><b>Conteneur '+(i+1)+' :</b> '+esc(d.num)+scTxt+
      (sup.length?' <span class="help">('+sup.join(' · ')+')</span>':'')+'</div>';
  }).join('');
  // Bloc « Scellés du camion » (dépotage uniquement).
  if(estDep && scellesCam.length){
    conteneurs='<div style="margin-bottom:6px"><b>Scellés du camion :</b> '+
      scellesCam.map(function(s){return esc(s);}).join(' · ')+'</div>'+conteneurs;
  }
  var peutEditer=(role==='ADMIN')||(role==='CFS'&&x.statut===STATUTS.CREEE);
  var dep='';
  if(x.typeOperation && x.typeOperation!=='Enlèvement' && x.numeroDeclaration){
    dep='<div class="kv">'+kv('Déclarant',x.declarant)+kv('Contact',x.contactDeclarant)+kv('Destination',x.destinationMarchandise)+
      kv('Bureau décl.',x.bureauDeclaration)+kv('Type décl.',x.typeDeclaration)+kv('N° décl.',x.numeroDeclaration)+
      kv('Année',x.anneeDeclaration)+'</div>'+(x.descriptionMarchandise?'<div style="margin-top:8px"><b style="color:var(--muted)">Description :</b> '+esc(x.descriptionMarchandise)+'</div>':'');
  }
  var h='<div class="card"><div class="row" style="align-items:center"><h2 style="margin:0;flex:1">'+esc(x.id)+'</h2>'+statutTag(x.statut, x)+'</div>'+
    (x.rapportId?'<p class="help" style="margin:4px 0 0">Rapport : <b class="mono">'+esc(x.rapportId)+'</b></p>':'')+
    '<div class="row" style="margin-top:8px"><button class="btn sec sm" onclick="go(\'dash\')" type="button">‹ Retour au tableau de bord</button>'+
    (peutEditer?'<button class="btn sm" onclick="go(\'edit\',\''+esc(x.id)+'\')">✎ Éditer</button>':'')+
    '<button class="btn sec sm" onclick="corrigerCamionForm(\''+esc(x.id)+'\',\''+esc(x.numeroCamion)+'\')">✎ Corriger N° camion</button>'+
    ((role==='CFS'||role==='ADMIN')&&estEnl?'<button class="btn sec sm" onclick="visiteForm(\''+esc(x.id)+'\')">🔍 Visite (scellé)</button>':'')+
    ((role==='CFS'||role==='ADMIN')?'<button class="btn sec sm" onclick="mixteForm(\''+esc(x.id)+'\')">⊞ Chargement mixte</button>':'')+
    ((role==='CFS'||role==='ADMIN')?'<button class="btn ok sm" onclick="downloadLoading(\''+esc(x.id)+'\')">⤓ Rapport de chargement</button>':'')+'</div></div>';

  /* Bannière chargement mixte */
  if(x.chargementMixte==='Oui'){
    var hist=[]; try{ hist=JSON.parse(x.mixteDetails||'[]'); }catch(e){}
    var li=hist.map(function(m){
      var parts=[]; if(m.note)parts.push(esc(m.note)); if(m.infos)parts.push(esc(m.infos));
      if(m.conteneursAjoutes&&m.conteneursAjoutes.length)parts.push('Conteneurs ajoutés : '+esc(m.conteneursAjoutes.join(', ')));
      return '<div class="dup-row">'+fmtDate(m.date)+' · '+esc(m.agent||'')+' — '+(parts.join(' · ')||'—')+'</div>';
    }).join('');
    h+='<div class="card"><div class="dup-soft"><div class="dup-head">⊞ Chargement mixte (plusieurs déclarations)</div>'+(li||'<div class="help">Marqué comme chargement mixte.</div>')+'</div></div>';
  }

  /* Bannière dispense (arrivée au bureau de destination) */
  if(x.baliseRequise==='Non'||x.sauteBalise==='Oui'){
    var dispDone=(x.arriveeBureau==='Oui');
    var canSolde=(role==='BALISE'||role==='ADMIN')&&x.statut===STATUTS.SORTIE&&!dispDone;
    h+='<div class="card"><div class="dup-soft"><div class="dup-head">⚑ Dispense de balise'+(x.numeroDispense?' — N° '+esc(x.numeroDispense):'')+'</div>'+
      '<div>Arrivée au bureau de destination : <b>'+(dispDone?'✓ confirmée le '+fmtDate(x.dateArriveeBureau):'en attente')+'</b></div>'+
      (canSolde?'<button class="btn sm" style="margin-top:8px" onclick="soldeDispense(\''+esc(x.id)+'\')">✔ Confirmer l\'arrivée (solder)</button>':'')+
      '</div></div>';
  }

  /* Timeline (5 cellules : CFS → T1 → Balise → Bon de Sortie → PP) */
  var t1nums=[]; try{ t1nums=JSON.parse(x.t1Numeros||'[]'); }catch(e){}
  var ckl={}; try{ ckl=JSON.parse(x.ppChecklist||'{}'); }catch(e){}
  h+='<div class="card"><h2>Parcours de la cargaison</h2><div class="timeline">'+
    step(x.statut!==STATUTS.CAMION && x.statut!==STATUTS.CHARGEMENT, (x.statut===STATUTS.CAMION||x.statut===STATUTS.CHARGEMENT),'① CFS — '+(x.statut===STATUTS.CAMION?'Camion créé (à compléter)':(x.statut===STATUTS.CHARGEMENT?'En cours de chargement':'Fin de chargement')),
      '<div class="kv">'+kv('Date',fmtDate(x.dateCreation))+kv('N° Camion',x.numeroCamion)+kv('Opération',x.typeOperation||'—')+
      (estEnl?kv('TWINS',x.twins):'')+kv('Agent CFS',x.agentCFS)+'</div>'+
      (conteneurs?'<div class="kv" style="margin-top:6px">'+conteneurs+'</div>':'')+dep+
      (x.nbColis?'<div class="kv" style="margin-top:6px">'+kv('Nombre de colis',x.nbColis)+'</div>':'')+
      (x.observationsCFS?'<div style="margin-top:6px"><b style="color:var(--muted)">Obs. :</b> '+esc(x.observationsCFS)+'</div>':''))+
    step(sValidDone, sCfsDone && !sValidDone,'✔ Validation — Chef brigade',
      sValidDone?('<div class="kv">'+kv('Validé par',x.agentValidation)+kv('Date',fmtDate(x.dateValidation))+(x.signatureValidation?kv('Signature',x.signatureValidation):'')+'</div>')
      :'<span style="color:var(--muted)">En attente de validation…</span>')+
    step(sT1done||x.sauteT1==='Oui', sValidDone && x.statut===STATUTS.CREEE && x.sauteT1!=='Oui','② Cellule T1',
      x.sauteT1==='Oui'?'<span style="color:var(--muted)">Non requise (Conso / Magasin)</span>'
      :(sT1done?('<div class="kv">'+kv('N° T1',t1Display(t1nums))+kv('Bureau destination',x.bureauDestination)+kv('Date',fmtDate(x.dateT1))+kv('Agent',x.agentT1)+'</div>'+
        (x.observationsT1?'<div style="margin-top:6px"><b style="color:var(--muted)">Obs. :</b> '+esc(x.observationsT1)+'</div>':''))
        :'<span style="color:var(--muted)">En attente…</span>'))+
    step(sBaldone, sT1done && !sBaldone,'③ Cellule Balise',
      x.sauteBalise==='Oui'?'<span style="color:var(--muted)">Non balisée (dispense)</span>'
      :(sBaldone?('<div class="kv">'+
        (x.baliseRequise==='Non'?kv('Dispense','N° '+(x.numeroDispense||'—')):kv('N° Balise',x.numeroGPS))+
        kv('T1 vérifié',x.t1Correct)+kv('Date',fmtDate(x.datePoseGPS))+kv('Agent',x.agentBalise)+'</div>'+
        (x.observationsBalise?'<div style="margin-top:6px"><b style="color:var(--muted)">Obs. :</b> '+esc(x.observationsBalise)+'</div>':''))
        :'<span style="color:var(--muted)">En attente…</span>'))+
    step(sBSdone, sT1done && !sBSdone,'④ Bon de Sortie',
      sBSdone?('<div class="kv">'+kv('N° Bon de sortie',bsDisplay(x.bonSortieNumero))+kv('Date',fmtDate(x.dateBonSortie))+kv('Agent',x.agentBonSortie)+'</div>'+
        (x.observationsBonSortie?'<div style="margin-top:6px"><b style="color:var(--muted)">Obs. :</b> '+esc(x.observationsBonSortie)+'</div>':''))
        :'<span style="color:var(--muted)">En attente…</span>')+
    step(sSortie, sBaldone && sBSdone && !sSortie,'⑤ Porte de Sortie (PP)',
      sSortie?('<div class="kv">'+kv('Date sortie',fmtDate(x.dateSortie))+kv('Agent',x.agentPP)+
        (x.etatSortie?kv('État sortie CFS',x.etatSortie):'')+
        kv('Checklist',(ckl.cfs&&ckl.t1&&ckl.balise&&ckl.bs)?'CFS · T1 · Balise · BS ✓':(x.infosValidees||'—'))+'</div>'+
        (x.observationsPP?'<div style="margin-top:6px"><b style="color:var(--muted)">Obs. :</b> '+esc(x.observationsPP)+'</div>':''))
        :'<span style="color:var(--muted)">En attente…</span>')+
    '</div></div>';

  /* Panneaux d'action selon rôle + ÉTAPES EN ATTENTE (modèle parallèle Balise ∥ Bon de Sortie) */
  var isAdmin=(role==='ADMIN'); var pend=etapesEnAttente(x);
  // ① Porte CFS / CFS — saisir l'opération (camion vide) ou ajouter un conteneur (dépotage en cours / binôme 20')
  var aCompleter=(x.statut===STATUTS.CAMION || x.statut===STATUTS.CHARGEMENT);
  var binome20=(x.statut===STATUTS.CREEE && x.typeOperation==='Enlèvement' && Number(x.nbConteneurs||0)===1 && dets[0] && tailleBucket(dets[0].taille)==='t20');
  var peutAjouterCont=(role==='CFS'||isAdmin) && (x.statut===STATUTS.CAMION || (x.statut===STATUTS.CHARGEMENT && estDep) || binome20);
  if(peutAjouterCont){
    var premier=(x.statut===STATUTS.CAMION);
    var titreCf=premier?'Saisir l’opération (1ᵉ conteneur)':(binome20?"Ajouter le 2ᵉ conteneur (binôme 20')":'Ajouter un conteneur');
    var anneeDef=x.anneeDeclaration||new Date().getFullYear(), bureauDef=x.bureauDeclaration||'TG120', typedDef=x.typeDeclaration||'T';
    h+='<div class="card"><h2>✎ '+esc(titreCf)+'</h2>';
    if(premier && !x.typeOperation){
      // Compat : ancien camion créé sans type → on le demande.
      h+='<div class="row">'+field("Type d'opération *",'<select id="cf2_type"><option value="">— Choisir —</option><option>Enlèvement</option><option>Dépotage</option></select>')+'</div>';
    } else if(premier){
      // v2.9 : type fixé par la Porte Principale à l'entrée (routage).
      h+='<p class="help">Camion <b>'+esc(x.numeroCamion)+'</b> — opération <b>'+esc(x.typeOperation)+'</b>.</p>';
    } else {
      h+='<p class="help">Camion <b>'+esc(x.numeroCamion)+'</b> · '+esc(x.typeOperation)+' · déjà '+Number(x.nbConteneurs||0)+' conteneur(s).</p>';
    }
    // Déclaration DU conteneur (N° par conteneur → chargement mixte possible). Préfixe année/bureau/type auto, éditable.
    h+='<div class="section-title">Déclaration du conteneur</div>'+
      '<div class="row">'+
        field('Année *','<input type="number" id="cf2_annee" value="'+esc(anneeDef)+'">')+
        field('Bureau *','<input type="text" class="up" id="cf2_bureau" value="'+esc(bureauDef)+'">')+
        field('Type décl. *','<select class="up" id="cf2_typed">'+TYPES_DECL.map(function(t){return '<option value="'+t+'" '+(t===typedDef?'selected':'')+'>'+t+'</option>';}).join('')+'</select>')+
        field('N° déclaration *','<input type="text" class="up" id="cf2_numd" value="'+esc(premier?'':(x.numeroDeclaration||''))+'">')+
      '</div><div id="cf2_apure" class="help" style="margin-bottom:6px">—</div>';
    // Déclaration COMPLÈTE — saisie pour CHAQUE conteneur (1er ET suivants), mêmes champs jusqu'à la désignation.
    // (Chaque conteneur peut porter sa propre déclaration.) Le « nombre de colis » n'est demandé qu'au 1er conteneur d'un enlèvement.
    {
      h+='<div id="cf2_enlonly" class="hidden">'+
          '<div class="section-title">Déclaration'+(premier?' (déclarant &amp; marchandise)':' du conteneur (déclarant &amp; marchandise)')+'</div>'+
          '<div class="row">'+field('Déclarant *','<input type="text" class="up" id="cf2_decl" value="'+esc(premier?(x.declarant||''):'')+'">')+field('Contact (tél) *','<input type="text" class="tel" id="cf2_contact" inputmode="tel" value="'+esc(premier?(x.contactDeclarant||''):'')+'">')+'</div>'+
          '<div class="row">'+field('Destination *','<input type="text" class="up" id="cf2_dest" value="'+esc(premier?(x.destinationMarchandise||''):'')+'">')+field('Nombre de conteneurs déclarés *','<input type="number" id="cf2_nb" min="1">')+
            ((estDep||!premier)?'':field('Nombre de colis','<input type="number" id="cf2_colis" min="0" value="'+esc(x.nbColis||'')+'">'))+'</div>'+
          field('Description *','<textarea class="up" id="cf2_desc" maxlength="600">'+esc(premier?(x.descriptionMarchandise||''):'')+'</textarea>')+
        '</div>';
    }
    var plombInit=premier?false:(x.typeOperation==='Enlèvement');   // binôme enlèvement : scellé visible
    h+='<div class="section-title">Conteneur à ajouter</div><datalist id="stockTC"></datalist>'+
      // v2.8 — case « saisie manuelle » : conteneur partagé entre 2 camions (déjà dépoté), hors stock.
      '<div id="cf2_manuelwrap" class="hidden"><label class="radio" style="margin-bottom:6px"><input type="checkbox" id="cf2_manuel" style="width:auto"> Saisir le conteneur manuellement (conteneur partagé entre deux camions)</label></div>'+
      '<div class="row" style="align-items:flex-end">'+
        field('N° conteneur (TC) *','<input type="text" class="tc" id="cf2_tc" list="stockTC" maxlength="11" placeholder="MSKU1234567">','Choisi dans le stock (taille/type auto-remplis)')+
        field('Taille *','<select id="cf2_taille">'+selOptsPh(TAILLES_CONTENEUR,binome20?"20'":'')+'</select>')+
        field('Type','<select id="cf2_ctype">'+selOptsPh(TYPES_CONTENEUR,'')+'</select>','Saisi à la main (facultatif)')+
        '<div id="cf2_plombwrap" class="'+(plombInit?'':'hidden')+'">'+field('Scellé/Plomb *','<input type="text" class="up" id="cf2_plomb" maxlength="30">')+'</div>'+
      '</div>'+
      '<button class="btn" id="cf2_add">✔ '+(premier?'Enregistrer':'Ajouter le conteneur')+'</button>'+
      '</div>';
  }
  // ②bis CFS — DÉPOTAGE : hauteur + colis, PUIS scellés camion → attente validation. (Déclaration déjà saisie par conteneur.)
  if((role==='CFS'||isAdmin) && x.statut===STATUTS.CHARGEMENT && estDep){
    h+='<div class="card"><h2>✎ CFS — Finaliser le dépotage (hauteur, colis, scellés)</h2>'+
      '<p class="help">La déclaration a été saisie avec chaque conteneur. Renseignez la <b>hauteur du chargement</b> et le <b>nombre de colis</b>, puis posez les <b>scellés du camion (2 à 3)</b>.</p>'+
      '<div class="row">'+field('Hauteur du chargement (m) *','<input type="text" id="cd_haut" inputmode="decimal" maxlength="10" placeholder="ex : 4,20" value="'+esc(x.hauteurChargement||'')+'">','> 4,5 m ⇒ signalé automatiquement « hors gabarit »')+field('Nombre de colis *','<input type="number" id="cd_colis" min="0" value="'+esc(x.nbColis||'')+'">')+'</div>'+
      '<div id="cd_hgwarn"></div>'+
      '<div class="section-title">Scellés du camion (2 à 3)</div>'+
      '<div class="row">'+field('Scellé 1 *','<input type="text" class="up cdsc" maxlength="30">')+field('Scellé 2 *','<input type="text" class="up cdsc" maxlength="30">')+field('Scellé 3','<input type="text" class="up cdsc" maxlength="30">')+'</div>'+
      field('Observations','<textarea id="cd_obs" maxlength="1000"></textarea>')+
      '<button class="btn" id="cd_save">✔ Finaliser (→ validation chef brigade)</button></div>';
  }
  // v3.0 — Validation chef brigade (signature) : maillon obligatoire avant T1/Balise/BS.
  if((role==='CHEF_BRIGADE'||isAdmin) && pend.indexOf('VALIDATION')>=0){
    h+='<div class="card"><h2>✔ Validation — Chef brigade (signature)</h2>'+
      '<p class="help">Tant que vous n\'avez pas validé, le T1, la Balise et le Bon de sortie restent <b>bloqués</b>.</p>'+
      // v3.3 — Signalement HORS GABARIT au CB (dépotage uniquement). Pas de mention « système ».
      (estDep && x.horsGabarit==='Oui'?'<div class="dup-strong" style="margin-bottom:10px">⚠ <b>HORS GABARIT</b> — hauteur du chargement '+esc(x.hauteurChargement||'?')+' m.</div>':'')+
      field('Observations','<textarea id="v_obs" maxlength="1000"></textarea>')+
      '<button class="btn" id="v_save">✔ Valider et signer</button></div>';
  }
  // v3.3 — La carte « Hors gabarit » (chefs visite/division/adjoint & CFS) est SUPPRIMÉE :
  // le hors gabarit n'est plus affiché qu'au chef brigade (ci-dessus), uniquement en dépotage.
  if((role==='T1'||isAdmin) && pend.indexOf('T1')>=0){
    h+='<div class="card"><h2>① Cellule T1</h2>'+
      '<datalist id="bureauxList">'+BUREAUX.map(function(b){return '<option value="'+esc(b)+'">';}).join('')+'</datalist>'+
      field('Bureau de destination *','<input type="text" id="t1_bureau" class="up" list="bureauxList" maxlength="60" autocomplete="off" value="'+esc(x.bureauDestination||'')+'">','Saisissez le code : les bureaux proches sont proposés.')+
      '<div class="section-title">Numéro(s) T1'+(estEnl?' — un par conteneur (1:1)':' — au moins un (1:N)')+'</div><div id="t1_list"></div>'+
      '<button class="btn sec sm" type="button" id="t1_add">＋ Ajouter un T1</button>'+
      field('Observations','<textarea id="t1_obs" maxlength="1000"></textarea>')+
      '<button class="btn" id="t1_save">✔ Valider la cellule T1</button></div>';
  }
  if((role==='BALISE'||isAdmin) && pend.indexOf('BALISE')>=0){
    h+='<div class="card"><h2>⊕ Cellule Balise</h2>'+
      '<label style="display:flex;gap:10px;align-items:center;margin-bottom:10px"><input type="checkbox" id="g_t1ok" style="width:auto"> <span>Numéro T1 correct (vérifié)</span></label>'+
      '<div class="field"><label>Balise ?</label><div>'+
        '<label class="radio"><input type="radio" name="g_req" value="oui" checked> Baliser</label>'+
        '<label class="radio"><input type="radio" name="g_req" value="non"> Dispense (sans balise)</label>'+
      '</div></div>'+
      '<div id="g_gpswrap">'+field('N° de balise *','<input type="text" id="g_num" class="up" maxlength="40">')+'</div>'+
      '<div id="g_dispwrap" class="hidden">'+field('N° autorisation de dispense *','<input type="text" id="g_disp" class="up" maxlength="60">')+'</div>'+
      field('Observations','<textarea id="g_obs" maxlength="1000"></textarea>')+
      '<button class="btn" id="g_save">✔ Valider la balise</button></div>';
  } else if(isAdmin && x.statut===STATUTS.GPS){
    h+='<div class="card"><h2>⟳ Remplacer la balise (ADMIN)</h2>'+
      '<div class="help" style="margin-bottom:10px">Balise actuelle : <b>'+esc(x.numeroGPS||'—')+'</b></div>'+
      field('Nouveau N° balise','<input type="text" id="ge_num" class="up" maxlength="40">')+
      field('Observations','<textarea id="ge_obs" maxlength="1000"></textarea>')+
      '<button class="btn" id="ge_save">✔ Remplacer</button></div>';
  }
  if((role==='BON_SORTIE'||isAdmin) && pend.indexOf('BS')>=0){
    var bsEnl=(estEnl && dets && dets.length>0);   // v2.8 : enlèvement = 1 bon par conteneur (lié au T1)
    h+='<div class="card"><h2>▣ Cellule Bon de Sortie</h2>'+
      (bsEnl?'<div class="section-title">Un bon de sortie par conteneur (lié au T1)</div><div id="bs_list"></div>'
            :field('N° du bon de sortie *','<input type="text" id="bs_num" class="up" maxlength="60">'))+
      field('Observations','<textarea id="bs_obs" maxlength="1000"></textarea>')+
      '<button class="btn" id="bs_save">✔ Émettre le bon de sortie</button></div>';
  }
  if((role==='PP'||isAdmin) && pend.indexOf('PP')>=0){
    h+='<div class="card"><h2>⇲ Porte de Sortie — checklist finale</h2>'+
      ppCheck('ck_cfs','Rapport CFS conforme')+ppCheck('ck_t1','Numéro(s) T1 valide(s)')+
      ppCheck('ck_balise','Numéro de balise vérifié')+ppCheck('ck_bs','Numéro du bon de sortie vérifié')+
      field('Observations','<textarea id="p_obs" maxlength="1000"></textarea>')+
      '<button class="btn" id="p_save">✔ Valider la sortie</button></div>';
  }
  c.innerHTML=h;

  /* ----- handlers ----- */
  // v3.2 — Validation chef brigade (signature). Le hors gabarit est automatique (saisi par le CFS).
  if($('#v_save')){
    $('#v_save').addEventListener('click',function(){
      busy(true); this.disabled=true;
      call('cargo.valider',{id:x.id, observations:$('#v_obs')?$('#v_obs').value:''}).then(function(){
        busy(false); toast('Validé et signé ✔','ok'); go('detail',x.id);
      }).catch(function(e){ busy(false); err(e); });
    });
  }
  // Porte CFS / CFS — ajout d'un conteneur (+ déclaration complète en enlèvement)
  if($('#cf2_add')){
    var stockMap={};
    // v2.9 — DÉPOTAGE : on ne propose QUE le « stock CFS journalier » (conteneurs Positionné = pointés le matin).
    // Enlèvement : tout le stock disponible (En stock + Positionné). Auto-remplissage taille/type (LOT L).
    var cf2Depot=(x.typeOperation==='Dépotage');
    call('stock.list',{statut:'tous'}).then(function(r){
      var dl=$('#stockTC'), opts='';
      (r.rows||[]).forEach(function(s){
        var ok = (s.statut==='Positionné') || (!cf2Depot && s.statut==='En stock');
        if(ok){
          stockMap[s.numeroTC]={taille:s.taille,type:s.typeConteneur};
          opts+='<option value="'+esc(s.numeroTC)+'">'+esc((s.taille||'')+' '+(s.typeConteneur||''))+'</option>';
        }
      });
      if(dl) dl.innerHTML=opts; autofill();
    }).catch(function(){});
    var cf2Type=function(){ return $('#cf2_type') ? $('#cf2_type').value : x.typeOperation; };
    var estManuel=function(){ return !!($('#cf2_manuel') && $('#cf2_manuel').checked); };
    var setSel=function(sel,raw){ if(!sel)return; var v=String(raw||''),hit='';
      for(var i=0;i<sel.options.length;i++){ if(sel.options[i].value===v){hit=v;break;} }
      if(!hit){ var b=tailleBucket(v),m={t20:"20'",t40:"40'",t45:"45'"}; if(m[b])hit=m[b]; }
      if(hit) sel.value=hit; };
    // v3.1 — seule la TAILLE est auto-remplie/verrouillée depuis le stock ; le TYPE reste saisi à la main.
    var lockTT=function(lock){ if($('#cf2_taille'))$('#cf2_taille').disabled=lock; };
    var autofill=function(){
      if(estManuel()) return;                 // saisie manuelle : on n'écrase pas
      var tc=($('#cf2_tc')?$('#cf2_tc').value:'').trim().toUpperCase().replace(/[^A-Z0-9]/g,'');
      var s=stockMap[tc];
      if(s){ setSel($('#cf2_taille'),s.taille); lockTT(true); }   // type non auto-rempli (saisi à la main)
      else lockTT(false);
    };
    var refreshCf2=function(){
      var enl=(cf2Type()==='Enlèvement');
      // v2.8 — le bloc déclaration (déclarant & co) est visible pour les DEUX opérations dès la saisie.
      if($('#cf2_enlonly')) $('#cf2_enlonly').classList.remove('hidden');
      if($('#cf2_plombwrap')) $('#cf2_plombwrap').classList.toggle('hidden', !enl);
      // La saisie manuelle (conteneur partagé) ne concerne que le DÉPOTAGE.
      if($('#cf2_manuelwrap')) $('#cf2_manuelwrap').classList.toggle('hidden', enl);
      if(enl && $('#cf2_manuel')) $('#cf2_manuel').checked=false;
      autofill();
    };
    if($('#cf2_type')) $('#cf2_type').addEventListener('change',refreshCf2);
    if($('#cf2_tc')){ $('#cf2_tc').addEventListener('input',autofill); $('#cf2_tc').addEventListener('change',autofill); }
    if($('#cf2_manuel')) $('#cf2_manuel').addEventListener('change',function(){
      if(estManuel()){ lockTT(false); if($('#cf2_taille'))$('#cf2_taille').value=''; if($('#cf2_ctype'))$('#cf2_ctype').value=''; if($('#cf2_tc'))$('#cf2_tc').setAttribute('placeholder','Saisie manuelle (partagé)'); }
      else autofill();
    });
    refreshCf2();
    var lk=function(){
      var d={anneeDeclaration:$('#cf2_annee').value,bureauDeclaration:$('#cf2_bureau').value,typeDeclaration:$('#cf2_typed').value,numeroDeclaration:$('#cf2_numd').value};
      if(!d.numeroDeclaration) return;
      call('decl.lookup',{declaration:d}).then(function(r){ if(!$('#cf2_apure')) return;
        if(r.exists){ $('#cf2_apure').innerHTML='Déclaration connue · restant à apurer <b style="color:var(--blue)">'+r.restant+'</b>'; if($('#cf2_nb'))$('#cf2_nb').value=r.nombreConteneurs; }
        else $('#cf2_apure').textContent='Nouvelle déclaration.'; }).catch(function(){});
    };
    ['#cf2_annee','#cf2_bureau','#cf2_typed','#cf2_numd'].forEach(function(s){ var el=$(s); if(el) el.addEventListener('change',lk); });
    $('#cf2_add').addEventListener('click',function(){
      var premier=(x.statut===STATUTS.CAMION);
      var type=premier?cf2Type():x.typeOperation;
      if(premier && !type){ toast("Choisissez le type d'opération",'warn'); return; }
      var estEnlF=(type==='Enlèvement');
      var tc=$('#cf2_tc').value.trim().toUpperCase().replace(/[^A-Z0-9]/g,'');
      if(!/^[A-Z]{4}[0-9]{7}$/.test(tc)){ toast('N° conteneur = 4 lettres + 7 chiffres','warn'); return; }
      if(!$('#cf2_taille').value){ toast('Taille requise','warn'); return; }
      if(!$('#cf2_numd').value.trim()){ toast('N° de déclaration requis','warn'); return; }
      if(estEnlF && (!$('#cf2_plomb')||!$('#cf2_plomb').value.trim())){ toast('Scellé obligatoire (enlèvement)','warn'); return; }
      var conteneur={ num:tc, taille:$('#cf2_taille').value, type:$('#cf2_ctype').value,
        plomb:(estEnlF&&$('#cf2_plomb')?$('#cf2_plomb').value:''),
        manuel:estManuel(),
        numeroDeclaration:$('#cf2_numd').value, anneeDeclaration:$('#cf2_annee').value,
        bureauDeclaration:$('#cf2_bureau').value, typeDeclaration:$('#cf2_typed').value };
      var payload={ id:x.id, conteneur:conteneur };
      var estDepF=(type==='Dépotage');
      if(premier) payload.typeOperation=type;
      if(premier && estEnlF && $('#cf2_colis') && $('#cf2_colis').value!=='') payload.nbColis=$('#cf2_colis').value; // colis enlèvement (dépotage = à l'étape scellés)
      // Déclaration COMPLÈTE pour CHAQUE conteneur (1er ET suivants) — mêmes champs jusqu'à la désignation.
      if(!$('#cf2_decl')||!$('#cf2_decl').value.trim()||!$('#cf2_contact').value.trim()||!$('#cf2_dest').value.trim()||!$('#cf2_desc').value.trim()){ toast('Complétez la déclaration du conteneur','warn'); return; }
      payload.declaration={ declarant:$('#cf2_decl').value, contactDeclarant:$('#cf2_contact').value, destinationMarchandise:$('#cf2_dest').value,
        bureauDeclaration:$('#cf2_bureau').value, typeDeclaration:$('#cf2_typed').value, numeroDeclaration:$('#cf2_numd').value,
        anneeDeclaration:$('#cf2_annee').value, descriptionMarchandise:$('#cf2_desc').value, nombreConteneurs:($('#cf2_nb')&&$('#cf2_nb').value?Number($('#cf2_nb').value):'') };
      busy(true); this.disabled=true;
      call('cargo.cfs',payload).then(function(){ busy(false); toast(estEnlF?'Enlèvement enregistré ✔':'Conteneur ajouté ✔','ok'); go('detail',x.id); }).catch(function(e){ busy(false); err(e); });
    });
  }
  // CFS — DÉPOTAGE : hauteur + colis (hors gabarit auto si > 4,5 m) + scellés camion → validation
  if($('#cd_save')){
    var hauteurNum=function(){ var v=parseFloat(String($('#cd_haut').value||'').replace(',','.').replace(/[^0-9.]/g,'')); return isNaN(v)?null:v; };
    var warnHG=function(){ var v=hauteurNum(); $('#cd_hgwarn').innerHTML=(v!=null&&v>4.5)
      ?'<div class="dup-strong">⚠ Hauteur '+v+' m &gt; 4,5 m → sera signalé <b>HORS GABARIT</b> au chef brigade.</div>':''; };
    $('#cd_haut').addEventListener('input',warnHG); warnHG();
    $('#cd_save').addEventListener('click',function(){
      var sc=$all('.cdsc').map(function(i){return i.value;}).filter(function(v){return v.trim();});
      if(!$('#cd_haut').value.trim()){ toast('Hauteur du chargement requise','warn'); return; }
      if($('#cd_colis').value===''){ toast('Nombre de colis requis','warn'); return; }
      if(sc.length<2){ toast('Au moins 2 scellés camion','warn'); return; }
      busy(true); this.disabled=true;
      call('cargo.declaration',{id:x.id, hauteurChargement:$('#cd_haut').value, nbColis:$('#cd_colis').value, scellesCamion:sc, observationsCFS:$('#cd_obs').value}).then(function(r){
        busy(false); toast(r&&r.horsGabarit?'Finalisé — HORS GABARIT signalé ✔':'Dépotage finalisé ✔','ok'); go('detail',x.id);
      }).catch(function(e){ busy(false); err(e); });
    });
  }
  if($('#t1_list')){
    // v2.8 — Enlèvement : chaque T1 est LIÉ à un conteneur (menu déroulant ; un conteneur choisi
    // disparaît des autres listes). Dépotage : simple liste de numéros (1:N).
    var t1Conts=(dets||[]).map(function(o){return String(o.num||o.conteneur||'');}).filter(Boolean);
    var enlT1=(estEnl && t1Conts.length>0);
    var refreshT1=function(){ var chosen=$all('.t1-cont').map(function(s){return s.value;});
      $all('.t1-cont').forEach(function(sel){ Array.prototype.forEach.call(sel.options,function(op){ if(op.value) op.disabled=(chosen.indexOf(op.value)>=0 && op.value!==sel.value); }); }); };
    var addT1=function(valNum,valCont){ var r=document.createElement('div'); r.className='row t1-row'; r.style.alignItems='flex-end';
      var contSel= enlT1 ? field('Conteneur *','<select class="up t1-cont"><option value="">— choisir —</option>'+t1Conts.map(function(tc){return '<option value="'+esc(tc)+'"'+(tc===valCont?' selected':'')+'>'+esc(tc)+'</option>';}).join('')+'</select>') : '';
      r.innerHTML=contSel+field('N° T1','<input type="text" class="up t1-num" maxlength="40" value="'+esc(valNum||'')+'">')+
        '<div class="field" style="flex:0"><button class="btn danger sm" type="button">✕</button></div>';
      $('#t1_list').appendChild(r);
      $('.danger',r).addEventListener('click',function(){ r.remove(); refreshT1(); });
      var cs=$('.t1-cont',r); if(cs) cs.addEventListener('change',refreshT1);
      refreshT1(); };
    if(t1nums.length) t1nums.forEach(function(o){ if(o&&typeof o==='object') addT1(o.numero,o.conteneur); else addT1(o,''); });
    else if(enlT1) t1Conts.forEach(function(tc){ addT1('',tc); });
    else addT1('','');
    $('#t1_add').addEventListener('click',function(){ addT1('',''); });
    $('#t1_save').addEventListener('click',function(){
      if(!$('#t1_bureau').value.trim()){ toast('Bureau de destination requis','warn'); return; }
      var payloadT1;
      if(enlT1){ var arr=[],bad=false;
        $all('.t1-row').forEach(function(rw){ var n=$('.t1-num',rw)?$('.t1-num',rw).value.trim():''; var cc=$('.t1-cont',rw)?$('.t1-cont',rw).value:''; if(n||cc){ if(!n||!cc) bad=true; arr.push({conteneur:cc,numero:n}); } });
        if(bad){ toast('Associez chaque T1 à un conteneur','warn'); return; }
        if(!arr.length){ toast('Au moins un T1','warn'); return; }
        payloadT1=arr;
      } else { payloadT1=$all('.t1-num').map(function(i){return i.value;}).filter(function(v){return v.trim();});
        if(!payloadT1.length){ toast('Au moins un N° T1','warn'); return; } }
      busy(true); this.disabled=true;
      call('cargo.t1',{id:x.id, bureauDestination:$('#t1_bureau').value, t1Numeros:payloadT1, observations:$('#t1_obs').value}).then(function(){
        busy(false); toast('Cellule T1 validée ✔','ok'); go('detail',x.id);
      }).catch(function(e){ busy(false); err(e); });
    });
  }
  if($('#bs_list')){   // v2.8 — un bon de sortie par conteneur (pré-rempli avec son T1)
    var t1map={}; (t1nums||[]).forEach(function(o){ if(o&&typeof o==='object'&&o.conteneur) t1map[o.conteneur]=o.numero; });
    (dets||[]).forEach(function(o){ var tc=String(o.num||o.conteneur||''); if(!tc) return;
      var r=document.createElement('div'); r.className='row bs-row'; r.style.alignItems='flex-end';
      r.innerHTML='<input type="hidden" class="bs-cont" value="'+esc(tc)+'"><input type="hidden" class="bs-t1" value="'+esc(t1map[tc]||'')+'">'+
        field('Conteneur','<input type="text" class="up" value="'+esc(tc)+'" disabled>')+
        field('T1','<input type="text" class="up" value="'+esc(t1map[tc]||'—')+'" disabled>')+
        field('N° bon de sortie *','<input type="text" class="up bs-num" maxlength="60">');
      $('#bs_list').appendChild(r); });
  }
  function gReq(){ var r=document.querySelector('input[name=g_req]:checked'); return r?r.value:'oui'; }
  $all('input[name=g_req]').forEach(function(rb){ rb.addEventListener('change',function(){
    var oui=(gReq()==='oui');
    if($('#g_gpswrap')) $('#g_gpswrap').classList.toggle('hidden', !oui);
    if($('#g_dispwrap')) $('#g_dispwrap').classList.toggle('hidden', oui);
    if($('#g_save')) $('#g_save').textContent=oui?'✔ Valider la balise':'✔ Valider la dispense';
  }); });
  if($('#g_save')) $('#g_save').addEventListener('click',function(){
    var requise=(gReq()==='oui');
    if(!$('#g_t1ok').checked){ toast('Cochez « Numéro T1 correct »','warn'); return; }
    var num=$('#g_num')?$('#g_num').value.trim():'';
    var disp=$('#g_disp')?$('#g_disp').value.trim():'';
    if(requise && !num){ toast('N° balise requis','warn'); return; }
    if(!requise && !disp){ toast('N° dispense requis','warn'); return; }
    busy(true); this.disabled=true;
    call('cargo.gps',{id:x.id, numeroGPS:num, numeroDispense:disp, t1Correct:true, observations:$('#g_obs').value, baliseRequise:(requise?'Oui':'Non')}).then(function(){
      busy(false); toast(requise?'Balise enregistrée ✔':'Dispense enregistrée ✔','ok'); go('detail',x.id);
    }).catch(function(e){ busy(false); err(e); });
  });
  if($('#ge_save')) $('#ge_save').addEventListener('click',function(){
    var num=$('#ge_num').value.trim(); if(!num){ toast('Nouveau N° balise requis','warn'); return; }
    busy(true); this.disabled=true;
    call('cargo.gpsedit',{id:x.id, numeroGPS:num, observations:$('#ge_obs').value}).then(function(){
      busy(false); toast('Balise remplacée ✔','ok'); go('detail',x.id);
    }).catch(function(e){ busy(false); err(e); });
  });
  if($('#bs_save')) $('#bs_save').addEventListener('click',function(){
    var payloadBS;
    if($('#bs_list')){   // enlèvement : un bon par conteneur (lié au T1)
      var arr=[],bad=false;
      $all('.bs-row').forEach(function(rw){ var n=$('.bs-num',rw)?$('.bs-num',rw).value.trim():'';
        var cc=$('.bs-cont',rw)?$('.bs-cont',rw).value:''; var t1=$('.bs-t1',rw)?$('.bs-t1',rw).value:'';
        if(n) arr.push({conteneur:cc,t1:t1,numero:n}); else bad=true; });
      if(bad){ toast('Un bon de sortie par conteneur','warn'); return; }
      if(!arr.length){ toast('Au moins un bon de sortie','warn'); return; }
      payloadBS=arr;
    } else { var num=$('#bs_num').value.trim(); if(!num){ toast('N° bon de sortie requis','warn'); return; } payloadBS=num; }
    busy(true); this.disabled=true;
    call('cargo.bonsortie',{id:x.id, bonSortieNumero:payloadBS, observations:$('#bs_obs').value}).then(function(){
      busy(false); toast('Bon de sortie émis ✔','ok'); go('detail',x.id);
    }).catch(function(e){ busy(false); err(e); });
  });
  if($('#p_save')) $('#p_save').addEventListener('click',function(){
    if(!($('#ck_cfs').checked&&$('#ck_t1').checked&&$('#ck_balise').checked&&$('#ck_bs').checked)){ toast('Cochez les 4 contrôles','warn'); return; }
    busy(true); this.disabled=true;
    call('cargo.sortie',{id:x.id, ckCfs:true, ckT1:true, ckBalise:true, ckBs:true, observations:$('#p_obs').value}).then(function(){
      busy(false); toast('Sortie validée ✔','ok'); go('detail',x.id);
    }).catch(function(e){ busy(false); err(e); });
  });
}
function ppCheck(id,label){ return '<label style="display:flex;gap:10px;align-items:center;margin-bottom:8px"><input type="checkbox" id="'+id+'" style="width:auto"> <span>'+esc(label)+'</span></label>'; }
function step(done,current,title,body){
  var cl=done?'done':(current?'current':'');
  return '<div class="step '+cl+'"><div class="dot"></div><h4>'+esc(title)+'</h4>'+body+'</div>';
}
function kv(k,v){ return '<div><b>'+esc(k)+' :</b> '+esc(v||'—')+'</div>'; }

/* ---- Détail d'un VÉHICULE (saute la balise : CFS → Sortie) ---- */
function renderDetailVehicule(c, x){
  var role=STATE.user.role;
  var v={}; try{ v=JSON.parse(x.vehiculeDetails||'{}'); }catch(e){}
  var sortie=(x.statut===STATUTS.SORTIE);
  var dep='<div class="kv">'+kv('Déclarant',x.declarant)+kv('Contact',x.contactDeclarant)+kv('Destination',x.destinationMarchandise)+
    kv('Bureau décl.',x.bureauDeclaration)+kv('Type décl.',x.typeDeclaration)+kv('N° décl.',x.numeroDeclaration)+kv('Année',x.anneeDeclaration)+'</div>'+
    (x.descriptionMarchandise?'<div style="margin-top:8px"><b style="color:var(--muted)">Description :</b> '+esc(x.descriptionMarchandise)+'</div>':'');
  var extra=(v.extra||[]).map(function(z){ return (z&&z.nom)?('<div><b>'+esc(z.nom)+' :</b> '+esc(z.valeur||'')+'</div>'):''; }).join('');
  var h='<div class="card"><div class="row" style="align-items:center"><h2 style="margin:0;flex:1">'+esc(x.id)+' <span class="tag st-sortie">Véhicule</span></h2>'+statutTag(x.statut, x)+'</div>'+

    '<div class="row" style="margin-top:8px"><button class="btn sec sm" onclick="go(\'dash\')" type="button">‹ Retour au tableau de bord</button>'+
    '<button class="btn sec sm" onclick="corrigerCamionForm(\''+esc(x.id)+'\',\''+esc(x.numeroCamion)+'\')">✎ Corriger N° châssis</button></div></div>';
  var isAdmin=(role==='ADMIN');
  var t1nums=[]; try{ t1nums=JSON.parse(x.t1Numeros||'[]'); }catch(e){}
  // v3.6 — moteur d'étapes (gère l'ouillage : sauts T1/BS + statut « Véhicule ouillage créé »).
  var pend=etapesEnAttente(x);
  var estOuil=aFait(x.ouillageNumero);
  var vT1=(x.sauteT1==='Oui')||aFait(x.dateT1)||sortie, vBS=(x.sauteBS==='Oui')||aFait(x.bonSortieNumero)||sortie;
  var vValid=(x.sauteValidation==='Oui')||aFait(x.dateValidation)||sortie;
  h+='<div class="card"><h2>Parcours du véhicule (saute la Balise)</h2><div class="timeline">'+
    step(x.statut!==STATUTS.VEHICULE_OUILLAGE, x.statut===STATUTS.VEHICULE_OUILLAGE,'① Enregistrement CFS'+(estOuil?' — OUILLAGE':''),
      '<div class="kv">'+kv('Date',fmtDate(x.dateCreation))+kv('N° châssis (VIN)',x.numeroCamion)+kv('Marque',v.marque)+kv('Modèle',v.modele)+
      kv('Couleur',v.couleur)+kv('Destination',v.destination)+kv("Conteneur d'origine",x.conteneurOrigine)+
      (estOuil?kv('N° Ouillage',x.ouillageNumero)+kv('Date Ouillage',fmtDate(x.ouillageDate)):'')+
      kv('Agent CFS',x.agentCFS)+'</div>'+
      (x.statut===STATUTS.VEHICULE_OUILLAGE?'<div class="dup-soft" style="margin-top:6px">Déclaration à renseigner (permis d\'examiner).</div>':'')+
      (extra?'<div class="kv" style="margin-top:6px">'+extra+'</div>':'')+dep+
      (x.observationsCFS?'<div style="margin-top:6px"><b style="color:var(--muted)">Obs. :</b> '+esc(x.observationsCFS)+'</div>':''))+
    step(vValid, pend.indexOf('VALIDATION')>=0,'✔ Validation — Chef brigade',
      vValid?('<div class="kv">'+kv('Validé par',x.agentValidation)+kv('Date',fmtDate(x.dateValidation))+(x.signatureValidation?kv('Signature',x.signatureValidation):'')+'</div>'):'<span style="color:var(--muted)">En attente de validation…</span>')+
    step(vT1, pend.indexOf('T1')>=0,'② Cellule T1',
      x.sauteT1==='Oui'?'<span style="color:var(--muted)">Non requise ('+(estOuil?'ouillage — régime hors transit':'régime')+')</span>'
      :(vT1&&aFait(x.dateT1)?('<div class="kv">'+kv('N° T1',t1Display(t1nums))+kv('Bureau destination',x.bureauDestination)+kv('Date',fmtDate(x.dateT1))+kv('Agent',x.agentT1)+'</div>'):'<span style="color:var(--muted)">En attente…</span>'))+
    step(vBS, pend.indexOf('BS')>=0,'③ Bon de Sortie',
      x.sauteBS==='Oui'?'<span style="color:var(--muted)">Non requis (ouillage)</span>'
      :(vBS&&aFait(x.bonSortieNumero)?('<div class="kv">'+kv('N° Bon de sortie',bsDisplay(x.bonSortieNumero))+kv('Date',fmtDate(x.dateBonSortie))+kv('Agent',x.agentBonSortie)+'</div>'):'<span style="color:var(--muted)">En attente…</span>'))+
    step(sortie, pend.indexOf('PP')>=0,'④ Sortie (Porte Principale)',
      sortie?('<div class="kv">'+kv('Date sortie',fmtDate(x.dateSortie))+kv('Agent',x.agentPP)+kv('Infos validées',x.infosValidees)+'</div>'):'<span style="color:var(--muted)">En attente de sortie…</span>')+
    '</div></div>';
  // Panneaux d'action (moteur d'étapes ; l'ouillage saute T1 hors transit + Bon de sortie)
  if((role==='CFS'||isAdmin) && x.statut===STATUTS.VEHICULE_OUILLAGE){
    h+='<div class="card"><h2>✎ Ouillage — Compléter la déclaration du véhicule</h2>'+
      '<p class="help">Régime <b>Transit (T)</b> : passe par la cellule <b>T1</b>, saute Balise + Bon de sortie, sort à la PP. '+
        'Autres régimes (<b>C</b>onso, MAD…) : va <b>directement à la PP</b> (après validation chef brigade).</p>'+
      '<div class="row">'+field('Déclarant *','<input type="text" class="up" id="od_decl">')+field('Contact (tél) *','<input type="text" class="tel" id="od_contact" inputmode="tel">')+'</div>'+
      '<div class="row">'+field('Destination *','<input type="text" class="up" id="od_dest">')+field('Bureau *','<input type="text" class="up" id="od_bureau" value="TG120">')+'</div>'+
      '<div class="row">'+field('Type décl. *','<select class="up" id="od_typed">'+TYPES_DECL.map(function(t){return '<option value="'+t+'">'+t+'</option>';}).join('')+'</select>')+
        field('N° décl. *','<input type="text" class="up" id="od_numd">')+
        field('Année *','<input type="number" id="od_annee" value="'+new Date().getFullYear()+'">')+'</div>'+
      field('Description (facultatif)','<textarea class="up" id="od_desc" maxlength="600"></textarea>')+
      '<button class="btn" id="od_save">✔ Enregistrer la déclaration</button></div>';
  }
  if((role==='T1'||isAdmin) && pend.indexOf('T1')>=0){
    h+='<div class="card"><h2>① Cellule T1</h2>'+
      '<datalist id="bureauxList">'+BUREAUX.map(function(b){return '<option value="'+esc(b)+'">';}).join('')+'</datalist>'+
      field('Bureau de destination *','<input type="text" id="t1_bureau" class="up" list="bureauxList" maxlength="60" autocomplete="off">')+
      '<div class="section-title">Numéro(s) T1</div><div id="t1_list"></div>'+
      '<button class="btn sec sm" type="button" id="t1_add">＋ Ajouter un T1</button>'+
      field('Observations','<textarea id="t1_obs" maxlength="1000"></textarea>')+
      '<button class="btn" id="t1_save">✔ Valider la cellule T1</button></div>';
  }
  if((role==='BON_SORTIE'||isAdmin) && pend.indexOf('BS')>=0){
    h+='<div class="card"><h2>▣ Cellule Bon de Sortie</h2>'+
      field('N° du bon de sortie *','<input type="text" id="bs_num" class="up" maxlength="60">')+
      field('Observations','<textarea id="bs_obs" maxlength="1000"></textarea>')+
      '<button class="btn" id="bs_save">✔ Émettre le bon de sortie</button></div>';
  }
  if((role==='CHEF_BRIGADE'||isAdmin) && pend.indexOf('VALIDATION')>=0){
    h+='<div class="card"><h2>✔ Validation — Chef brigade (signature)</h2>'+
      '<p class="help">Tant que vous n\'avez pas validé, la suite du parcours reste <b>bloquée</b>.</p>'+
      field('Observations','<textarea id="v_obs" maxlength="1000"></textarea>')+
      '<button class="btn" id="v_save">✔ Valider et signer</button></div>';
  }
  if((role==='PP'||isAdmin) && pend.indexOf('PP')>=0){
    h+='<div class="card"><h2>⇲ Enregistrer la sortie du véhicule</h2>'+
      '<label style="display:flex;gap:10px;align-items:center;margin-bottom:12px"><input type="checkbox" id="p_val" style="width:auto"> <span>Informations validées (vérifiées et conformes)</span></label>'+
      field('Observations','<textarea id="p_obs" maxlength="1000"></textarea>')+
      '<button class="btn" id="p_save">✔ Confirmer la sortie</button></div>';
  } else if(role==='PP' && sortie){
    h+='<div class="card"><div class="empty">Véhicule déjà sorti.</div></div>';
  }
  c.innerHTML=h;
  // v3.6 — Ouillage : enregistrement de la déclaration du véhicule
  if($('#od_save')) $('#od_save').addEventListener('click',function(){
    var champs=[['#od_decl','Déclarant'],['#od_contact','Contact'],['#od_dest','Destination'],['#od_bureau','Bureau'],['#od_numd','N° de déclaration'],['#od_annee','Année']];
    for(var i=0;i<champs.length;i++){ if(!$(champs[i][0]).value.trim()){ toast(champs[i][1]+' requis','warn'); return; } }
    busy(true); this.disabled=true;
    call('cargo.ouillagedecl',{id:x.id, declaration:{ declarant:$('#od_decl').value, contactDeclarant:$('#od_contact').value,
      destinationMarchandise:$('#od_dest').value, bureauDeclaration:$('#od_bureau').value, typeDeclaration:$('#od_typed').value,
      numeroDeclaration:$('#od_numd').value, anneeDeclaration:$('#od_annee').value, descriptionMarchandise:$('#od_desc').value }}).then(function(r){
      busy(false); toast(r&&r.transit?'Déclaration enregistrée ✔ (Transit → cellule T1)':'Déclaration enregistrée ✔ (→ sortie PP)','ok'); go('detail',x.id);
    }).catch(function(e){ busy(false); err(e); });
  });
  // v3.6 — Validation chef brigade (véhicules)
  if($('#v_save')) $('#v_save').addEventListener('click',function(){
    busy(true); this.disabled=true;
    call('cargo.valider',{id:x.id, observations:$('#v_obs')?$('#v_obs').value:''}).then(function(){
      busy(false); toast('Validé et signé ✔','ok'); go('detail',x.id);
    }).catch(function(e){ busy(false); err(e); });
  });
  if($('#t1_list')){
    var addT1=function(val){ var r=document.createElement('div'); r.className='row t1-row'; r.style.alignItems='flex-end';
      r.innerHTML=field('N° T1','<input type="text" class="up t1-num" maxlength="40" value="'+esc(val||'')+'">')+
        '<div class="field" style="flex:0"><button class="btn danger sm" type="button">✕</button></div>';
      $('#t1_list').appendChild(r); $('.danger',r).addEventListener('click',function(){ r.remove(); }); };
    if(t1nums.length) t1nums.forEach(addT1); else addT1('');
    $('#t1_add').addEventListener('click',function(){ addT1(''); });
    $('#t1_save').addEventListener('click',function(){
      var nums=$all('.t1-num').map(function(i){return i.value;}).filter(function(v){return v.trim();});
      if(!$('#t1_bureau').value.trim()){ toast('Bureau de destination requis','warn'); return; }
      if(!nums.length){ toast('Au moins un N° T1','warn'); return; }
      busy(true); this.disabled=true;
      call('cargo.t1',{id:x.id, bureauDestination:$('#t1_bureau').value, t1Numeros:nums, observations:$('#t1_obs').value}).then(function(){
        busy(false); toast('Cellule T1 validée ✔','ok'); go('detail',x.id);
      }).catch(function(e){ busy(false); err(e); });
    });
  }
  if($('#bs_save')) $('#bs_save').addEventListener('click',function(){
    var payloadBS;
    if($('#bs_list')){   // enlèvement : un bon par conteneur (lié au T1)
      var arr=[],bad=false;
      $all('.bs-row').forEach(function(rw){ var n=$('.bs-num',rw)?$('.bs-num',rw).value.trim():'';
        var cc=$('.bs-cont',rw)?$('.bs-cont',rw).value:''; var t1=$('.bs-t1',rw)?$('.bs-t1',rw).value:'';
        if(n) arr.push({conteneur:cc,t1:t1,numero:n}); else bad=true; });
      if(bad){ toast('Un bon de sortie par conteneur','warn'); return; }
      if(!arr.length){ toast('Au moins un bon de sortie','warn'); return; }
      payloadBS=arr;
    } else { var num=$('#bs_num').value.trim(); if(!num){ toast('N° bon de sortie requis','warn'); return; } payloadBS=num; }
    busy(true); this.disabled=true;
    call('cargo.bonsortie',{id:x.id, bonSortieNumero:payloadBS, observations:$('#bs_obs').value}).then(function(){
      busy(false); toast('Bon de sortie émis ✔','ok'); go('detail',x.id);
    }).catch(function(e){ busy(false); err(e); });
  });
  if($('#p_save')) $('#p_save').addEventListener('click',function(){
    if(!$('#p_val').checked){ toast('Cochez « Informations validées »','warn'); return; }
    busy(true); this.disabled=true;
    call('cargo.sortie',{id:x.id, infosValidees:true, observations:$('#p_obs').value}).then(function(){
      busy(false); toast('Sortie enregistrée ✔','ok'); go('detail',x.id);
    }).catch(function(e){ busy(false); err(e); });
  });
}

/* ---- Rapport d'activité CFS (Admin + agents CFS) ---- */
function isoDate(d){ var p=function(n){return ('0'+n).slice(-2);}; return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate()); }
function weekRange(){ var now=new Date(); var day=(now.getDay()+6)%7; var mon=new Date(now); mon.setDate(now.getDate()-day); var sun=new Date(mon); sun.setDate(mon.getDate()+6); return [mon,sun]; }
function monthRange(){ var now=new Date(); return [new Date(now.getFullYear(),now.getMonth(),1), new Date(now.getFullYear(),now.getMonth()+1,0)]; }

SCREENS.cfsreport=function(c){
  var isAdmin=STATE.user.role==='ADMIN';
  var today=isoDate(new Date());
  c.innerHTML='<div class="card"><h2>∑ Rapport d\'activité CFS</h2>'+
    '<p class="help">'+(isAdmin?'Synthèse par période — tous les agents ou filtrée par agent CFS.':'Votre activité CFS sur la période choisie.')+'</p>'+
    '<div class="field"><label>Périodicité</label><div>'+
      '<button class="btn sec sm" type="button" onclick="cfsPeriode(\'jour\')">Jour</button> '+
      '<button class="btn sec sm" type="button" onclick="cfsPeriode(\'semaine\')">Semaine</button> '+
      '<button class="btn sec sm" type="button" onclick="cfsPeriode(\'mois\')">Mois</button> '+
      '<button class="btn sec sm" type="button" onclick="cfsPeriode(\'personnalise\')">Personnalisé</button>'+
    '</div></div>'+
    '<div class="row" style="align-items:flex-end">'+
      field('Du','<input type="date" id="cf_du" value="'+today+'">')+
      field('Au','<input type="date" id="cf_au" value="'+today+'">')+
      field('Opération','<select id="cf_op"><option value="">Tous (séparés)</option><option>Enlèvement</option><option>Dépotage</option></select>')+
      (isAdmin?field('Agent CFS','<select id="cf_agent"><option value="">Tous les agents</option></select>'):'')+
      '<button class="btn" id="cf_go">Afficher</button>'+
      '<button class="btn sec" onclick="dlCFS(\'xlsx\')">⤓ Excel</button>'+
      '<button class="btn sec" onclick="dlCFS(\'pdf\')">⤓ PDF</button>'+
    '</div>'+
    '<input type="hidden" id="cf_periode" value="jour">'+
    '</div><div id="cfres"></div>';
  if(isAdmin){
    call('user.list',{}).then(function(rows){
      var sel=$('#cf_agent'); if(!sel) return;
      rows.filter(function(u){return u.role==='CFS'||u.role==='ADMIN';}).forEach(function(u){
        var o=document.createElement('option'); o.value=u.nomComplet; o.textContent=u.nomComplet+' ('+u.username+')'; sel.appendChild(o);
      });
    }).catch(function(){});
  }
  $('#cf_go').addEventListener('click',runCFS);
  $('#cf_op').addEventListener('change',runCFS);

function cfsPeriode(p){
  $('#cf_periode').value=p; var r;
  if(p==='jour'){ var t=isoDate(new Date()); $('#cf_du').value=t; $('#cf_au').value=t; }
  else if(p==='semaine'){ r=weekRange(); $('#cf_du').value=isoDate(r[0]); $('#cf_au').value=isoDate(r[1]); }
  else if(p==='mois'){ r=monthRange(); $('#cf_du').value=isoDate(r[0]); $('#cf_au').value=isoDate(r[1]); }
  if(p!=='personnalise') runCFS();
}
function cfsParams(format){
  return { periode:$('#cf_periode').value, du:$('#cf_du').value, au:$('#cf_au').value,
           operation:($('#cf_op')?$('#cf_op').value:''),
           agentCFS:($('#cf_agent')?$('#cf_agent').value:''), format:format||'view' };
}
function runCFS(){ busy(true); call('report.cfs',cfsParams('view')).then(function(d){ busy(false); renderCFS(d); }).catch(function(e){ busy(false); err(e); }); }
function dlCFS(format){ busy(true); call('report.cfs',cfsParams(format)).then(function(b){ busy(false); saveBlob(b); }).catch(function(e){ busy(false); err(e); }); }
function renderCFS(d){
  // Carte cliquable -> ouvre le détail (op = ''|'Enlèvement'|'Dépotage' ; metric).
  // op='' = toutes opérations (les cartes TOTAL sont donc cliquables elles aussi).
  function statCard(n,l,op,metric){
    if(!metric) return '<div class="stat"><div class="n">'+(n||0)+'</div><div class="l">'+esc(l)+'</div></div>';
    return '<div class="stat clickable" title="Voir le détail" onclick="cfsDetailOpen(\''+(op||'')+'\',\''+metric+'\')">'+
      '<div class="n">'+(n||0)+'</div><div class="l">'+esc(l)+'</div></div>';
  }
  function bloc(titre,op,o){ var evp=(o.t20||0)+2*((o.t40||0)+(o.t45||0)); return '<div class="card"><h2>'+titre+'</h2><div class="stats">'+
    statCard(o.camions,'Camions',op,'camions')+
    statCard(o.t20,"20'",op,'t20')+statCard(o.t40,"40'",op,'t40')+statCard(o.t45,"45'",op,'t45')+
    statCard(o.autres,'Autres / n.p.',op,'autres')+
    statCard(o.conteneurs,'Total conteneurs',op,'conteneurs')+
    '<div class="stat green"><div class="n">'+evp+'</div><div class="l">EVP</div></div>'+'</div>'+
    '<p class="help">Cliquez une carte pour voir le détail.</p></div>'; }
  var op=$('#cf_op')?$('#cf_op').value:'';
  var html='<div class="card"><b>Période :</b> '+esc(d.du||'…')+' → '+esc(d.au||'…')+
    ' &nbsp;·&nbsp; <b>Opération :</b> '+esc(op||'Toutes')+' &nbsp;·&nbsp; <b>Agent :</b> '+esc(d.agent)+'</div>';
  if(op==='' || op==='Enlèvement') html+=bloc('Enlèvement','Enlèvement',d.enlevement);
  if(op==='' || op==='Dépotage')  html+=bloc('Dépotage','Dépotage',d.depotage);
  if(op==='') html+='<div class="card"><div class="stats">'+statCard(d.totalCamions,'TOTAL camions','','camions')+statCard(d.totalConteneurs,'TOTAL conteneurs','','conteneurs')+'</div></div>';
  $('#cfres').innerHTML=html;
}
function cfsLabelMetric(m){ return {camions:'Camions',conteneurs:'Tous les conteneurs',t20:"Conteneurs 20'",t40:"Conteneurs 40'",t45:"Conteneurs 45'",autres:'Conteneurs autres / non précisé'}[m]||m; }
function cfsDetailOpen(op,metric){
  var pr=cfsParams('view'); delete pr.format; pr.operation=op; pr.metric=metric;
  busy(true);
  call('report.cfsdetail',pr).then(function(d){ busy(false); renderCFSDetail(op,metric,d); }).catch(function(e){ busy(false); err(e); });
}
function renderCFSDetail(op,metric,d){
  var title=(op||'Toutes opérations')+' — '+cfsLabelMetric(metric)+' ('+d.rows.length+')';
  var body;
  if(!d.rows.length){ body='<div class="empty">Aucun élément sur la période.</div>'; }
  else if(d.kind==='camions'){

function renderAct(d){
  var cfg=ACT_CFG_C[ACT.kind]; var op=$('#ac_op')?$('#ac_op').value:'';
  function statCard(n,l,o,metric){
    return '<div class="stat clickable" title="Voir le détail" onclick="actDetailOpen(\''+(o||'')+'\',\''+metric+'\')">'+
      '<div class="n">'+(n||0)+'</div><div class="l">'+esc(l)+'</div></div>';
  }
  function bloc(titre,o,obj){
    var cards=statCard(obj.camions,cfg.camLabel,o,'camions');
    if(cfg.twins) cards+=statCard(obj.twins,'TWINS',o,'twins');
    cards+=statCard(obj.t20,"20'",o,'t20')+statCard(obj.t40,"40'",o,'t40')+statCard(obj.t45,"45'",o,'t45')+
      statCard(obj.autres,'Autres / n.p.',o,'autres')+statCard(obj.conteneurs,'Total conteneurs',o,'conteneurs');
