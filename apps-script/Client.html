    return '<div class="card"><h2>'+titre+'</h2><div class="stats">'+cards+'</div><p class="help">Cliquez une carte pour le détail.</p></div>';

  if(op===''||op==='Enlèvement') html+=bloc('Enlèvement','Enlèvement',d.enlevement);
  if(op===''||op==='Dépotage')  html+=bloc('Dépotage','Dépotage',d.depotage);
  if(op===''){ html+='<div class="card"><div class="stats">'+
    statCard(d.totalCamions,'TOTAL camions','','camions')+
    (cfg.twins?statCard(d.totalTwins,'TOTAL TWINS','','twins'):'')+
    statCard(d.totalConteneurs,'TOTAL conteneurs','','conteneurs')+'</div></div>'; }
  $('#acres').innerHTML=html;
}

function renderDwell(d){
  function card(n,l,cl,bucket){ return '<div class="stat '+(cl||'')+' clickable" title="Voir le détail" onclick="dwellDetailOpen(\''+bucket+'\',\''+esc(l)+'\')">'+
    '<div class="n">'+n+'</div><div class="l">'+esc(l)+'</div></div>'; }
  var h='<div class="card"><div class="stats">'+
    card(d.totalInstance,'En instance','','instance')+
    card(d.totalSortis,'Sortis','green','sortis')+
    card(d.delaiMoyen+' j','Délai moyen (sortis)','','sortis')+
    card(d.alerte,'≥ '+d.seuilAlerte+' jours',(d.alerte?'amber':''),'alerte')+
    '</div><p class="help">Cliquez une carte, une tranche, ou un camion pour accéder au détail.</p></div>';
  h+='<div class="card"><h2>Répartition par tranche (jours)</h2><table class="grid"><thead><tr><th>Tranche</th><th>En instance</th><th>Sortis</th></tr></thead><tbody>';
  d.tranches.forEach(function(t){ var al=(t.tranche==='90+'&&t.instance)?' style="background:#fdecea"':'';
    h+='<tr'+al+'><td>'+esc(t.tranche)+'</td>'+
      '<td class="clickable" onclick="dwellTrancheOpen(\''+t.tranche+'\',\'instance\')">'+t.instance+'</td>'+
      '<td class="clickable" onclick="dwellTrancheOpen(\''+t.tranche+'\',\'sortis\')">'+t.sortis+'</td></tr>'; });
  h+='</tbody></table></div>';
  if(d.instance.length){
    h+='<div class="card" style="overflow:auto"><h2>Camions en instance ('+d.instance.length+') — du plus ancien</h2>'+
      '<table class="grid"><thead><tr><th>ID</th><th>Camion</th><th>Opération</th><th>Statut</th><th>Créé le</th><th>Âge</th><th>Tranche</th></tr></thead><tbody>';
    d.instance.forEach(function(r){ var al=(r.ageJours>=d.seuilAlerte)?' style="background:#fdecea"':'';
      h+='<tr class="clickable"'+al+' onclick="go(\'detail\',\''+esc(r.id)+'\')"><td class="mono">'+esc(r.id)+'</td><td>'+esc(r.numeroCamion)+'</td><td>'+esc(r.operation)+'</td><td>'+statutTag(r.statut, r)+'</td><td>'+fmtDate(r.dateCreation)+'</td><td>'+r.ageJours+' j</td><td>'+esc(r.tranche)+'</td></tr>'; });
    h+='</tbody></table></div>';
  } else { h+='<div class="card"><div class="empty">Aucun camion en instance.</div></div>'; }
  $('#dwres').innerHTML=h;
}
function dwellDetailOpen(bucket,label){
  busy(true);
  call('report.dwelldetail',{bucket:bucket}).then(function(d){ busy(false); renderDwellDetail(label,d); }).catch(function(e){ busy(false); err(e); });
}
function dwellTrancheOpen(tranche,etat){
  busy(true);
  var lbl='Tranche '+tranche+' jours — '+(etat==='sortis'?'sortis':'en instance');
  call('report.dwelldetail',{bucket:etat,tranche:tranche}).then(function(d){ busy(false); renderDwellDetail(lbl,d); }).catch(function(e){ busy(false); err(e); });
}
function renderDwellDetail(label,d){
  var title=label+' ('+d.rows.length+')';
  var body;
  if(!d.rows.length){ body='<div class="empty">Aucun camion.</div>'; }
  else body='<table class="grid" style="min-width:660px"><thead><tr><th>ID</th><th>Camion</th><th>Opération</th><th>Statut</th><th>Créé le</th><th>Sorti le</th><th>'+(d.bucket==='sortis'?'Délai':'Âge')+'</th></tr></thead><tbody>'+
    d.rows.map(function(r){ var al=(!r.sorti&&r.ageJours>=90)?' style="background:#fdecea"':'';
      return '<tr class="clickable"'+al+' onclick="closeModal();go(\'detail\',\''+esc(r.id)+'\')">'+
      '<td class="mono">'+esc(r.id)+'</td><td>'+esc(r.numeroCamion)+'</td><td>'+esc(r.operation)+'</td>'+
      '<td>'+statutTag(r.statut, r)+'</td><td>'+fmtDate(r.dateCreation)+'</td><td>'+(r.sorti?fmtDate(r.dateSortie):'—')+'</td>'+
      '<td>'+r.ageJours+' j</td></tr>'; }).join('')+
    '</tbody></table>';
  modal(title,'<div style="overflow:auto">'+body+'</div>','<button class="btn sec" onclick="closeModal()">Fermer</button>');
}

      var h='<table class="grid"><thead><tr><th>Date/Heure</th><th>Utilisateur</th><th>Rôle</th><th>Action</th><th>Cargaison</th><th>Détails</th></tr></thead><tbody>';

        '<button class="btn sec sm" '+(r.page<=1?'disabled':'')+' onclick="window.__hprev()">‹</button>'+

/* Import du stock : fichier Excel (.xlsx) lu côté navigateur (SheetJS) → aperçu → validation. */
SCREENS.import=function(c){
  c.innerHTML='<div class="card"><h2>⮉ Import du stock (fichier Excel)</h2>'+
    '<p class="help">Choisissez un fichier <b>.xlsx</b> (ou .csv) à 4 colonnes, dans l’ordre : '+
      '<b>N° conteneur · Taille · Nombre de séjours · Date d’entrée</b>. Une éventuelle ligne d’en-tête est ignorée. '+
      'Les TC mal formés sont écartés ; un TC déjà présent est mis à jour (import journalier).</p>'+
    '<div class="row" style="align-items:flex-end">'+
      field('Fichier Excel','<input type="file" id="im_file" accept=".xlsx,.xls,.csv">')+
      field('Provenance par défaut','<input type="text" class="up" id="im_prov" value="PORT SEC">')+
    '</div>'+
    '<div id="im_prev"></div>'+
    '<button class="btn" id="im_go" disabled>⮉ Importer les lignes valides</button> <span id="im_res" class="help"></span></div>';
  var parsed=[];
  var tcOk=function(v){ return /^[A-Z]{4}[0-9]{7}$/.test(v); };
  function renderPreview(){
    if(!parsed.length){ $('#im_prev').innerHTML='<div class="empty">Aucune ligne lue.</div>'; $('#im_go').disabled=true; return; }
    var valid=parsed.filter(function(it){ return tcOk(it.numeroTC); });
    var h='<div class="help" style="margin:8px 0">'+parsed.length+' ligne(s) lue(s), <b>'+valid.length+'</b> valide(s).</div>'+
      '<table class="grid"><thead><tr><th>N° TC</th><th>Taille</th><th>Nb séjours</th><th>Date d’entrée</th><th>OK ?</th></tr></thead><tbody>';
    parsed.slice(0,200).forEach(function(it){ var ok=tcOk(it.numeroTC);
      h+='<tr><td class="mono">'+esc(it.numeroTC||'—')+'</td><td>'+esc(it.taille||'—')+'</td><td>'+esc(it.nbSejours||'—')+'</td><td>'+esc(it.dateEntree||'—')+'</td><td>'+(ok?'✔':'<span style="color:#c0392b">✕</span>')+'</td></tr>'; });
    $('#im_prev').innerHTML=h+'</tbody></table>';
    $('#im_go').disabled=(valid.length===0);
  }
  $('#im_file').addEventListener('change',function(e){
    var f=e.target.files&&e.target.files[0]; if(!f) return;
    if(typeof XLSX==='undefined'){ toast('Lecteur Excel indisponible (connexion requise)','warn'); return; }
    var rd=new FileReader();
    rd.onload=function(ev){
      try{
        var wb=XLSX.read(new Uint8Array(ev.target.result),{type:'array',cellDates:true});
        var ws=wb.Sheets[wb.SheetNames[0]];
        var rows=XLSX.utils.sheet_to_json(ws,{header:1,raw:false,defval:''});
        parsed=[];
        rows.forEach(function(r,i){
          if(!r||!r.length) return;
          var tc=String(r[0]||'').toUpperCase().replace(/[^A-Z0-9]/g,'');
          if(i===0 && !tcOk(tc)) return;   // saute la ligne d'en-tête
          if(!tc && !r[1] && !r[2] && !r[3]) return;
          parsed.push({ numeroTC:tc, taille:String(r[1]||'').trim(), nbSejours:String(r[2]||'').trim(), dateEntree:String(r[3]||'').trim() });
        });
        renderPreview();
      }catch(ex){ toast('Lecture du fichier impossible','warn'); }
    };
    rd.readAsArrayBuffer(f);
  });
  $('#im_go').addEventListener('click',function(){
    var items=parsed.filter(function(it){ return tcOk(it.numeroTC); })
      .map(function(it){ return { numeroTC:it.numeroTC, taille:it.taille, nbSejours:it.nbSejours, dateEntree:it.dateEntree }; });
    if(!items.length){ toast('Aucune ligne valide','warn'); return; }
    busy(true); $('#im_go').disabled=true;
    call('stock.import',{items:items, provenanceDefaut:$('#im_prov').value}).then(function(r){ busy(false);
      $('#im_res').innerHTML='✔ '+r.ajoutes+' ajouté(s), '+(r.maj||0)+' mis à jour, '+r.ignores+' ignoré(s).'; toast('Import terminé ✔','ok');
    }).catch(function(e){ busy(false); $('#im_go').disabled=false; err(e); });
  });
};

  function renderPreview(){
    if(!parsed.length){ $('#ia_prev').innerHTML='<div class="empty">Aucune ligne lue.</div>'; $('#ia_go').disabled=true; return; }
    var valid=parsed.filter(function(it){ return tcOk(it.numeroTC); });
    var h='<div class="help" style="margin:8px 0">'+parsed.length+' ligne(s) lue(s), <b>'+valid.length+'</b> valide(s).</div>'+
      '<table class="grid"><thead><tr><th>N° TC</th><th>Taille</th><th>Date entrée</th><th>Année</th><th>Bureau</th><th>Type</th><th>N° décl.</th><th>OK ?</th></tr></thead><tbody>';
    parsed.slice(0,200).forEach(function(it){ var ok=tcOk(it.numeroTC);
      h+='<tr><td class="mono">'+esc(it.numeroTC||'—')+'</td><td>'+esc(it.taille||'—')+'</td><td>'+esc(it.dateEntree||'—')+'</td><td>'+esc(it.anneeDeclaration||'—')+'</td><td>'+esc(it.bureauDeclaration||'—')+'</td><td>'+esc(it.typeDeclaration||'—')+'</td><td>'+esc(it.numeroDeclaration||'—')+'</td><td>'+(ok?'✔':'<span style="color:#c0392b">✕</span>')+'</td></tr>'; });
    $('#ia_prev').innerHTML=h+'</tbody></table>';
    $('#ia_go').disabled=(valid.length===0);
  }
  $('#ia_file').addEventListener('change',function(e){
    var f=e.target.files&&e.target.files[0]; if(!f) return;
    if(typeof XLSX==='undefined'){ toast('Lecteur Excel indisponible (connexion requise)','warn'); return; }
    var rd=new FileReader();
    rd.onload=function(ev){
      try{
        var wb=XLSX.read(new Uint8Array(ev.target.result),{type:'array',cellDates:true});
        var ws=wb.Sheets[wb.SheetNames[0]];
        var rows=XLSX.utils.sheet_to_json(ws,{header:1,raw:false,defval:''});
        parsed=[];
        rows.forEach(function(r,i){
          if(!r||!r.length) return;
          var tc=String(r[0]||'').toUpperCase().replace(/[^A-Z0-9]/g,'');
          if(i===0 && !tcOk(tc)) return;   // saute la ligne d'en-tête
          if(!tc && !r[1] && !r[2]) return;
          parsed.push({ numeroTC:tc, taille:String(r[1]||'').trim(), dateEntree:String(r[2]||'').trim(),
            anneeDeclaration:String(r[3]||'').trim(), bureauDeclaration:String(r[4]||'').trim(),
            typeDeclaration:String(r[5]||'').trim(), numeroDeclaration:String(r[6]||'').trim() });
        });
        renderPreview();
      }catch(ex){ toast('Lecture du fichier impossible','warn'); }
    };
    rd.readAsArrayBuffer(f);
  });
  $('#ia_go').addEventListener('click',function(){
    var items=parsed.filter(function(it){ return tcOk(it.numeroTC); });
    if(!items.length){ toast('Aucune ligne valide','warn'); return; }
    busy(true); $('#ia_go').disabled=true;
    call('stockannonce.import',{items:items}).then(function(r){ busy(false);
      $('#ia_res').innerHTML='✔ '+r.ajoutes+' annoncé(s), '+(r.maj||0)+' mis à jour, '+r.ignores+' ignoré(s).'; toast('Annonce importée ✔','ok');
    }).catch(function(e){ busy(false); $('#ia_go').disabled=false; err(e); });
  });
};

/* ----------------------------- Téléchargement ---------------------------- */
function saveBlob(b){
  try{
    var bin=atob(b.bytesBase64), len=bin.length, bytes=new Uint8Array(len);
    for(var i=0;i<len;i++) bytes[i]=bin.charCodeAt(i);
    var blob=new Blob([bytes],{type:b.mimeType});
    var url=URL.createObjectURL(blob), a=document.createElement('a');
    a.href=url; a.download=b.filename; document.body.appendChild(a); a.click();
    setTimeout(function(){ URL.revokeObjectURL(url); a.remove(); },1500);
    toast('Téléchargement : '+b.filename,'ok');
  }catch(e){ toast('Échec du téléchargement','bad'); }
}

/* ----------------------------- Divers ------------------------------------ */
function field(label, inner, help){

}
function err(e){ toast((e&&e.message)?e.message:'Une erreur est survenue','bad'); }

/* Force MAJUSCULES en temps réel sur tout champ .up ; .alnum retire en plus
 * les caractères spéciaux (utilisé pour le N° camion). */
function upperHandler(e){
  var el=e.target;
  if(!el || !el.classList) return;
  // Téléphone : chiffres + espaces, un seul « + » en tête.
  if(el.classList.contains('tel')){
    var pos0=el.selectionStart, t=el.value.replace(/[^\d+ ]/g,'').replace(/(?!^)\+/g,'');
    if(t!==el.value){ el.value=t; try{ el.setSelectionRange(pos0,pos0); }catch(_){ } }
    return;
  }
  // N° conteneur ISO 6346 : 4 lettres puis 7 chiffres, sans caractères spéciaux.
  if(el.classList.contains('tc')){
    var raw=el.value.toUpperCase().replace(/[^A-Z0-9]/g,'');
    var tc=raw.replace(/[^A-Z]/g,'').slice(0,4)+raw.replace(/[^0-9]/g,'').slice(0,7);
    if(tc!==el.value){ el.value=tc; try{ el.setSelectionRange(tc.length,tc.length); }catch(_){ } }
    return;
  }
  if(!el.classList.contains('up')) return;
  var pos=el.selectionStart, v=el.value.toUpperCase();
  if(el.classList.contains('alnum')) v=v.replace(/[^A-Z0-9\/-]/g,'');
  if(v!==el.value){ el.value=v; try{ el.setSelectionRange(pos,pos); }catch(_){ } }
}
