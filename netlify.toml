# ============================================================================
#  CARGO TRACKER v4 — Configuration Netlify
#  Hébergement statique de l'application React (apps/web) + en-têtes de sécurité.
#  La logique métier et les données vivent chez Supabase (Edge Functions + PostgreSQL).
# ============================================================================

[build]
  base    = "."
  command = "npm ci && npm run build"
  publish = "apps/web/dist"

# --- SPA : toutes les routes servent index.html (React Router) ---
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# --- En-têtes de sécurité (données douanières sensibles) ---
[[headers]]
  for = "/*"
  [headers.values]
    # HTTPS forcé pendant 2 ans, sous-domaines inclus
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    # CSP stricte : scripts/styles du site uniquement ; connexions limitées à
    # Supabase (auth + rpc) et Sentry. AUCUN script tiers.
    # NB : remplacer <PROJET> par la référence du projet Supabase au déploiement.
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' https://hwutqjlbzfcjfxvnugnx.supabase.co https://*.ingest.sentry.io; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"

# --- Cache long pour les assets fingerprintés de Vite ---
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
